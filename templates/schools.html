{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-building"></i> Schools Management</h2>
    <button class="btn btn-primary" onclick="showAddSchoolModal()">
        <i class="bi bi-plus-circle"></i> Add School
    </button>
</div>

<div class="card">
    <div class="card-header">
        <i class="bi bi-list-ul"></i> School Directory
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>School Name</th>
                        <th>Cluster</th>
                        <th>School Number</th>
                        <th>Contact Person</th>
                        <th>Contact Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="schoolsTable">
                    <tr><td colspan="7" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit School Modal -->
<div class="modal fade" id="schoolModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="schoolModalTitle">Add School</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="schoolForm">
                    <input type="hidden" id="schoolId">
                    <div class="mb-3">
                        <label class="form-label">School Name *</label>
                        <input type="text" class="form-control" id="schoolName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cluster Number</label>
                        <input type="text" class="form-control" id="clusterNumber">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">School Number</label>
                        <input type="text" class="form-control" id="schoolNumber">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="schoolAddress" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Person</label>
                        <input type="text" class="form-control" id="contactPerson">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Phone</label>
                        <input type="text" class="form-control" id="contactPhone">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveSchool()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadSchools() {
        try {
            const response = await fetch('/api/schools');
            const schools = await response.json();
            displaySchools(schools);
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function displaySchools(schools) {
        const tbody = document.getElementById('schoolsTable');
        if (!schools || schools.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No schools found</td></tr>';
            return;
        }
        
        tbody.innerHTML = schools.map(school => `
            <tr>
                <td>${school.id}</td>
                <td><strong>${school.name}</strong></td>
                <td>${school.cluster_number || '-'}</td>
                <td>${school.school_number || '-'}</td>
                <td>${school.contact_person || '-'}</td>
                <td>${school.contact_phone || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="editSchool(${school.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteSchool(${school.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                 </td>
             </tr>
        `).join('');
    }
    
    function showAddSchoolModal() {
        document.getElementById('schoolModalTitle').textContent = 'Add School';
        document.getElementById('schoolForm').reset();
        document.getElementById('schoolId').value = '';
        const modal = new bootstrap.Modal(document.getElementById('schoolModal'));
        modal.show();
    }
    
    async function editSchool(id) {
        const response = await fetch('/api/schools');
        const schools = await response.json();
        const school = schools.find(s => s.id === id);
        
        if (school) {
            document.getElementById('schoolModalTitle').textContent = 'Edit School';
            document.getElementById('schoolId').value = school.id;
            document.getElementById('schoolName').value = school.name || '';
            document.getElementById('clusterNumber').value = school.cluster_number || '';
            document.getElementById('schoolNumber').value = school.school_number || '';
            document.getElementById('schoolAddress').value = school.address || '';
            document.getElementById('contactPerson').value = school.contact_person || '';
            document.getElementById('contactPhone').value = school.contact_phone || '';
            
            const modal = new bootstrap.Modal(document.getElementById('schoolModal'));
            modal.show();
        }
    }
    
    async function saveSchool() {
        const id = document.getElementById('schoolId').value;
        const data = {
            name: document.getElementById('schoolName').value,
            cluster_number: document.getElementById('clusterNumber').value,
            school_number: document.getElementById('schoolNumber').value,
            address: document.getElementById('schoolAddress').value,
            contact_person: document.getElementById('contactPerson').value,
            contact_phone: document.getElementById('contactPhone').value
        };
        
        if (!data.name) {
            showToast('School name is required', 'error');
            return;
        }
        
        try {
            let response;
            if (id) {
                response = await fetch(`/api/schools/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } else {
                response = await fetch('/api/schools', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            }
            
            const result = await response.json();
            if (result.success) {
                showToast(id ? 'School updated' : 'School added');
                bootstrap.Modal.getInstance(document.getElementById('schoolModal')).hide();
                loadSchools();
            } else {
                showToast(result.error || 'Failed to save', 'error');
            }
        } catch (error) {
            showToast('Error saving school', 'error');
        }
    }
    
    async function deleteSchool(id) {
        if (confirm('Are you sure you want to delete this school? This will also remove all associated data.')) {
            try {
                const response = await fetch(`/api/schools/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    showToast('School deleted');
                    loadSchools();
                } else {
                    showToast(result.error || 'Cannot delete school with existing reports', 'error');
                }
            } catch (error) {
                showToast('Error deleting school', 'error');
            }
        }
    }
    
    loadSchools();
</script>
{% endblock %}
