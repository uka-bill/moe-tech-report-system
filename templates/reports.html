{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-archive"></i> All Technical Reports</h2>
    <div>
        <button class="btn btn-success me-2" onclick="exportReports()">
            <i class="bi bi-download"></i> Export CSV
        </button>
        <a href="{{ url_for('new_report') }}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> New Report
        </a>
    </div>
</div>

<!-- Advanced Filters -->
<div class="card mb-4">
    <div class="card-header">
        <i class="bi bi-funnel"></i> Advanced Filters
    </div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label">Report Type</label>
                <select class="form-select" id="filterType">
                    <option value="">All</option>
                    <option value="water">Water</option>
                    <option value="electricity">Electricity</option>
                    <option value="telephone">Telephone</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select class="form-select" id="filterStatus">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Priority</label>
                <select class="form-select" id="filterPriority">
                    <option value="">All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Entity Type</label>
                <select class="form-select" id="filterEntityType">
                    <option value="">All</option>
                    <option value="school">School</option>
                    <option value="department">Department</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Acknowledged</label>
                <select class="form-select" id="filterAcknowledged">
                    <option value="">All</option>
                    <option value="true">Acknowledged</option>
                    <option value="false">Not Acknowledged</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-primary w-100" onclick="loadAllReports()">
                    <i class="bi bi-search"></i> Search
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Reports Table -->
<div class="card">
    <div class="card-header">
        <i class="bi bi-table"></i> Report List
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Location</th>
                        <th>Problem</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Acknowledged</th>
                        <th>Technician</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="allReportsTable">
                    <tr><td colspan="10" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Report Modal -->
<div class="modal fade" id="editReportModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Report #<span id="editReportId"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editReportForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="editStatus">
                                <option value="pending">Pending</option>
                                <option value="in_progress">In Progress</option>
                                <option value="resolved">Resolved</option>
                                <option value="closed">Closed</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Priority</label>
                            <select class="form-select" id="editPriority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Action Taken</label>
                            <textarea class="form-control" id="editActionTaken" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Resolution Details</label>
                            <textarea class="form-control" id="editResolutionDetails" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Technician Notes</label>
                            <textarea class="form-control" id="editTechnicianNotes" rows="3"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveReportEdit()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentEditId = null;
    
    async function loadAllReports() {
        let url = '/api/technical-reports?';
        const type = document.getElementById('filterType').value;
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const entityType = document.getElementById('filterEntityType').value;
        const acknowledged = document.getElementById('filterAcknowledged').value;
        
        if (type) url += `&type=${type}`;
        if (status) url += `&status=${status}`;
        if (priority) url += `&priority=${priority}`;
        if (entityType) url += `&entity_type=${entityType}`;
        if (acknowledged) url += `&team_leader_acknowledged=${acknowledged === 'true'}`;
        
        try {
            const response = await fetch(url);
            const reports = await response.json();
            displayAllReports(reports);
        } catch (error) {
            console.error('Error loading reports:', error);
        }
    }
    
    function displayAllReports(reports) {
        const tbody = document.getElementById('allReportsTable');
        if (!reports || reports.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center">No reports found</td></tr>';
            return;
        }
        
        tbody.innerHTML = reports.map(report => `
            <tr class="report-type-${report.report_type}">
                <td>#${report.id}</td>
                <td>
                    <i class="bi bi-${report.report_type === 'water' ? 'droplet' : report.report_type === 'electricity' ? 'lightning-charge' : 'telephone'}"></i>
                    ${report.report_type}
                </td>
                <td>${report.entity_name || report.entity_type}</td>
                <td>${report.problem_type || '-'}</td>
                <td><span class="status-badge priority-${report.priority}">${report.priority}</span></td>
                <td><span class="status-badge status-${report.status}">${report.status}</span></td>
                <td>${report.team_leader_acknowledged ? '<span class="acknowledged-badge">✓ Acknowledged</span>' : '<span class="unacknowledged-badge">✗ Pending</span>'}</td>
                <td>${report.technician_name || '-'}</td>
                <td>${formatDate(report.created_at)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="viewReportDetail(${report.id})">
                        <i class="bi bi-eye"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="editReport(${report.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    ${!report.team_leader_acknowledged && isTeamLeader() ? `
                    <button class="btn btn-sm btn-outline-success" onclick="acknowledgeReport(${report.id})">
                        <i class="bi bi-check2-square"></i>
                    </button>
                    ` : ''}
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteReport(${report.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }
    
    async function viewReportDetail(id) {
        const response = await fetch('/api/technical-reports');
        const reports = await response.json();
        const report = reports.find(r => r.id === id);
        
        if (report) {
            const modalHtml = `
                <div class="modal fade" id="viewModal" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Report #${report.id} Details</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <strong>Type:</strong> ${report.report_type}<br>
                                        <strong>Location:</strong> ${report.entity_name || report.entity_type}<br>
                                        <strong>Problem:</strong> ${report.problem_type}<br>
                                        <strong>Priority:</strong> ${report.priority}<br>
                                        <strong>Status:</strong> ${report.status}
                                    </div>
                                    <div class="col-md-6">
                                        <strong>Technician:</strong> ${report.technician_name || '-'}<br>
                                        <strong>Created:</strong> ${formatDate(report.created_at)}<br>
                                        <strong>Acknowledged:</strong> ${report.team_leader_acknowledged ? 'Yes' : 'No'}
                                    </div>
                                </div>
                                <hr>
                                <h6>Complaint Details:</h6>
                                <p>${report.complaint_details || '-'}</p>
                                <h6>Technician Notes:</h6>
                                <p>${report.technician_notes || '-'}</p>
                                <h6>Action Taken:</h6>
                                <p>${report.action_taken || '-'}</p>
                                <h6>Resolution:</h6>
                                <p>${report.resolution_details || '-'}</p>
                                ${report.images && report.images.length ? `
                                <h6>Images:</h6>
                                <div class="d-flex flex-wrap">
                                    ${report.images.map(img => `<img src="${img}" class="image-preview m-1" onclick="window.open('${img}')">`).join('')}
                                </div>
                                ` : ''}
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Remove existing modal if any
            const existingModal = document.getElementById('viewModal');
            if (existingModal) existingModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('viewModal'));
            modal.show();
            
            document.getElementById('viewModal').addEventListener('hidden.bs.modal', function() {
                this.remove();
            });
        }
    }
    
    async function editReport(id) {
        const response = await fetch('/api/technical-reports');
        const reports = await response.json();
        const report = reports.find(r => r.id === id);
        
        if (report) {
            currentEditId = id;
            document.getElementById('editReportId').textContent = id;
            document.getElementById('editStatus').value = report.status || 'pending';
            document.getElementById('editPriority').value = report.priority || 'medium';
            document.getElementById('editActionTaken').value = report.action_taken || '';
            document.getElementById('editResolutionDetails').value = report.resolution_details || '';
            document.getElementById('editTechnicianNotes').value = report.technician_notes || '';
            
            const modal = new bootstrap.Modal(document.getElementById('editReportModal'));
            modal.show();
        }
    }
    
    async function saveReportEdit() {
        const updateData = {
            status: document.getElementById('editStatus').value,
            priority: document.getElementById('editPriority').value,
            action_taken: document.getElementById('editActionTaken').value,
            resolution_details: document.getElementById('editResolutionDetails').value,
            technician_notes: document.getElementById('editTechnicianNotes').value
        };
        
        try {
            const response = await fetch(`/api/technical-reports/${currentEditId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updateData)
            });
            const data = await response.json();
            
            if (data.success) {
                showToast('Report updated successfully');
                bootstrap.Modal.getInstance(document.getElementById('editReportModal')).hide();
                loadAllReports();
            } else {
                showToast(data.error || 'Failed to update', 'error');
            }
        } catch (error) {
            showToast('Error updating report', 'error');
        }
    }
    
    async function acknowledgeReport(id) {
        const notes = prompt('Enter acknowledgment notes:');
        try {
            const response = await fetch(`/api/technical-reports/${id}/acknowledge`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    team_leader_id: getCurrentUser().id,
                    team_leader_notes: notes || ''
                })
            });
            const data = await response.json();
            if (data.success) {
                showToast('Report acknowledged');
                loadAllReports();
            }
        } catch (error) {
            showToast('Error', 'error');
        }
    }
    
    async function deleteReport(id) {
        if (confirm('Are you sure you want to delete this report? This action cannot be undone.')) {
            try {
                const response = await fetch(`/api/technical-reports/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Report deleted');
                    loadAllReports();
                } else {
                    showToast(data.error || 'Failed to delete', 'error');
                }
            } catch (error) {
                showToast('Error deleting report', 'error');
            }
        }
    }
    
    function exportReports() {
        let url = '/api/export-reports?';
        const type = document.getElementById('filterType').value;
        if (type) url += `&type=${type}`;
        window.location.href = url;
        showToast('Exporting reports...');
    }
    
    // Check URL params for specific report
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id');
    const isEdit = urlParams.get('edit');
    
    if (reportId && isEdit) {
        setTimeout(() => editReport(parseInt(reportId)), 500);
    }
    
    loadAllReports();
</script>
{% endblock %}
