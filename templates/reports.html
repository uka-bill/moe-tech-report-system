{% extends "base.html" %}

{% block content %}
<style>
    /* Print Styles */
    @media print {
        body * {
            visibility: hidden;
        }
        .print-area, .print-area * {
            visibility: visible;
        }
        .print-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: white;
        }
        .no-print {
            display: none !important;
        }
        @page {
            size: A4;
            margin: 2cm;
        }
    }
    
    .status-badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        display: inline-block;
    }
    .status-pending {
        background-color: #fff3cd;
        color: #856404;
        border-left: 3px solid #ffc107;
    }
    .status-in_progress {
        background-color: #d1ecf1;
        color: #0c5460;
        border-left: 3px solid #17a2b8;
    }
    .status-resolved {
        background-color: #d4edda;
        color: #155724;
        border-left: 3px solid #28a745;
    }
    .priority-high {
        background-color: #f8d7da;
        color: #721c24;
        border-left: 3px solid #dc3545;
    }
    .priority-medium {
        background-color: #fff3cd;
        color: #856404;
        border-left: 3px solid #ffc107;
    }
    .priority-low {
        background-color: #d4edda;
        color: #155724;
        border-left: 3px solid #28a745;
    }
    .acknowledged-badge {
        background-color: #28a745;
        color: white;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
    }
    .unacknowledged-badge {
        background-color: #dc3545;
        color: white;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
    }
    .print-area {
        background: white;
        padding: 30px;
    }
    .modal-xl {
        max-width: 900px;
    }
    .detail-row {
        display: flex;
        margin-bottom: 12px;
        padding: 8px;
        border-bottom: 1px solid #eee;
    }
    .detail-label {
        width: 180px;
        font-weight: bold;
        color: #555;
    }
    .detail-value {
        flex: 1;
        color: #333;
    }
    .image-gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
    }
    .detail-image {
        max-width: 150px;
        max-height: 120px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid #ddd;
    }
    .detail-image:hover {
        transform: scale(1.05);
        transition: transform 0.2s;
    }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-archive"></i> Technical Reports</h2>
    <div>
        <button class="btn btn-success me-2" onclick="exportReports()">
            <i class="bi bi-download"></i> Export CSV
        </button>
        <a href="{{ url_for('new_report') }}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> New Report
        </a>
    </div>
</div>

<!-- Filters -->
<div class="card mb-4 no-print">
    <div class="card-header">
        <i class="bi bi-funnel"></i> Filters
    </div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label">Report Type</label>
                <select class="form-select" id="filterType">
                    <option value="">All</option>
                    <option value="water">Water</option>
                    <option value="electricity">Electricity</option>
                    <option value="telephone">Telephone</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select class="form-select" id="filterStatus">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Priority</label>
                <select class="form-select" id="filterPriority">
                    <option value="">All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Entity Type</label>
                <select class="form-select" id="filterEntityType">
                    <option value="">All</option>
                    <option value="school">School</option>
                    <option value="department">Department</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Acknowledged</label>
                <select class="form-select" id="filterAcknowledged">
                    <option value="">All</option>
                    <option value="true">Acknowledged</option>
                    <option value="false">Not Acknowledged</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-primary w-100" onclick="loadAllReports()">
                    <i class="bi bi-search"></i> Search
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Reports Table -->
<div class="card no-print">
    <div class="card-header">
        <i class="bi bi-table"></i> Report List
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Location</th>
                        <th>Problem</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Acknowledged</th>
                        <th>Technician</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="allReportsTable">
                    <tr><td colspan="10" class="text-center">Loading...</td</tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- View Report Modal -->
<div class="modal fade" id="viewReportModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-file-text"></i> Report Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewReportContent">
                <div class="text-center">Loading...</div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="printCurrentReport()">
                    <i class="bi bi-printer"></i> Print
                </button>
                <button type="button" class="btn btn-warning" onclick="editCurrentReport()">
                    <i class="bi bi-pencil"></i> Edit
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Print Modal -->
<div class="modal fade" id="printModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-printer"></i> Print Preview</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="printContent"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="executePrint()">
                    <i class="bi bi-printer"></i> Print
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentViewReport = null;
    let currentPrintReport = null;
    
    // Format date for Brunei Time (UTC+8)
    function formatDate(dateString) {
        if (!dateString) return '-';
        try {
            const date = new Date(dateString);
            // Add 8 hours for Brunei time (UTC+8)
            date.setHours(date.getHours() + 8);
            return date.toLocaleString('en-GB', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        } catch (e) {
            return dateString;
        }
    }
    
    function formatDateOnly(dateString) {
        if (!dateString) return '-';
        try {
            const date = new Date(dateString);
            date.setHours(date.getHours() + 8);
            return date.toLocaleDateString('en-GB');
        } catch (e) {
            return dateString;
        }
    }
    
    async function loadAllReports() {
        let url = '/api/technical-reports?';
        const type = document.getElementById('filterType').value;
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const entityType = document.getElementById('filterEntityType').value;
        const acknowledged = document.getElementById('filterAcknowledged').value;
        
        if (type) url += `&type=${type}`;
        if (status) url += `&status=${status}`;
        if (priority) url += `&priority=${priority}`;
        if (entityType) url += `&entity_type=${entityType}`;
        if (acknowledged) url += `&team_leader_acknowledged=${acknowledged === 'true'}`;
        
        try {
            const response = await fetch(url);
            const reports = await response.json();
            displayAllReports(reports);
        } catch (error) {
            console.error('Error loading reports:', error);
            showToast('Error loading reports', 'error');
        }
    }
    
    function displayAllReports(reports) {
        const tbody = document.getElementById('allReportsTable');
        if (!reports || reports.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center">No reports found</td</tr>';
            return;
        }
        
        tbody.innerHTML = reports.map(report => `
            <tr class="report-type-${report.report_type}">
                <td>#${report.id}</td>
                <td>
                    <i class="bi bi-${report.report_type === 'water' ? 'droplet' : report.report_type === 'electricity' ? 'lightning-charge' : 'telephone'}"></i>
                    ${report.report_type}
                 </td>
                <td>${report.entity_name || report.entity_type}</td>
                <td>${report.problem_type || '-'}</td>
                <td><span class="status-badge priority-${report.priority}">${report.priority}</span></td>
                <td><span class="status-badge status-${report.status}">${report.status.replace('_', ' ')}</span></td>
                <td>${report.team_leader_acknowledged ? '<span class="acknowledged-badge">✓ Acknowledged</span>' : '<span class="unacknowledged-badge">✗ Pending</span>'}</td>
                <td>${report.technician_name || '-'}</td>
                <td>${formatDate(report.created_at)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-info" onclick="viewReportDetail(${report.id})" title="View">
                        <i class="bi bi-eye"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="editReport(${report.id})" title="Edit">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-primary" onclick="printReport(${report.id})" title="Print">
                        <i class="bi bi-printer"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteReport(${report.id})" title="Delete">
                        <i class="bi bi-trash"></i>
                    </button>
                 </td>
             </tr>
        `).join('');
    }
    
    async function viewReportDetail(id) {
        try {
            const response = await fetch('/api/technical-reports');
            const reports = await response.json();
            const report = reports.find(r => r.id === id);
            
            if (report) {
                currentViewReport = report;
                displayReportInModal(report);
                const modal = new bootstrap.Modal(document.getElementById('viewReportModal'));
                modal.show();
            } else {
                showToast('Report not found', 'error');
            }
        } catch (error) {
            console.error('Error loading report:', error);
            showToast('Error loading report details', 'error');
        }
    }
    
    function displayReportInModal(report) {
        const reportTypeIcon = report.report_type === 'water' ? '💧' : report.report_type === 'electricity' ? '⚡' : '📞';
        const reportTypeName = report.report_type === 'water' ? 'Water' : report.report_type === 'electricity' ? 'Electricity' : 'Telephone';
        
        let imagesHtml = '';
        if (report.images && report.images.length > 0) {
            imagesHtml = `
                <div class="detail-row">
                    <div class="detail-label">Images:</div>
                    <div class="detail-value">
                        <div class="image-gallery">
                            ${report.images.map(img => `<img src="${img}" class="detail-image" onclick="window.open('${img}')" alt="Report Image">`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
        
        const html = `
            <div>
                <div style="background: #f8f5fc; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                    <strong>Report ID:</strong> #${report.id} &nbsp;|&nbsp;
                    <strong>Type:</strong> ${reportTypeName} ${reportTypeIcon} &nbsp;|&nbsp;
                    <strong>Created:</strong> ${formatDate(report.created_at)} &nbsp;|&nbsp;
                    <strong>Last Updated:</strong> ${formatDate(report.updated_at)}
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">Entity Type:</div>
                    <div class="detail-value">${report.entity_type === 'school' ? 'School' : 'Department'}</div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">Entity Name:</div>
                    <div class="detail-value">${report.entity_name || report.entity_type}</div>
                </div>
                
                ${report.account_number ? `
                <div class="detail-row">
                    <div class="detail-label">Account Number:</div>
                    <div class="detail-value">${report.account_number}</div>
                </div>
                ` : ''}
                
                ${report.meter_number ? `
                <div class="detail-row">
                    <div class="detail-label">Meter Number:</div>
                    <div class="detail-value">${report.meter_number}</div>
                </div>
                ` : ''}
                
                ${report.phone_number ? `
                <div class="detail-row">
                    <div class="detail-label">Phone Number:</div>
                    <div class="detail-value">${report.phone_number}</div>
                </div>
                ` : ''}
                
                ${report.number_of_lines ? `
                <div class="detail-row">
                    <div class="detail-label">Number of Lines:</div>
                    <div class="detail-value">${report.number_of_lines}</div>
                </div>
                ` : ''}
                
                ${report.reference_number ? `
                <div class="detail-row">
                    <div class="detail-label">Reference:</div>
                    <div class="detail-value">
                        ${report.reference_type ? report.reference_type.toUpperCase() + ': ' : ''}
                        ${report.reference_number}
                        ${report.reference_date ? ' (' + report.reference_date + ')' : ''}
                    </div>
                </div>
                ` : ''}
                
                <div class="detail-row">
                    <div class="detail-label">Problem Type:</div>
                    <div class="detail-value">${report.problem_type || '-'}</div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">Priority:</div>
                    <div class="detail-value">
                        <span class="status-badge priority-${report.priority}">${report.priority.toUpperCase()}</span>
                    </div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">Status:</div>
                    <div class="detail-value">
                        <span class="status-badge status-${report.status}">${report.status.replace('_', ' ').toUpperCase()}</span>
                    </div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">Complaint Details:</div>
                    <div class="detail-value">${report.complaint_details || '-'}</div>
                </div>
                
                ${report.technician_notes ? `
                <div class="detail-row">
                    <div class="detail-label">Technician Notes:</div>
                    <div class="detail-value">${report.technician_notes}</div>
                </div>
                ` : ''}
                
                ${report.action_taken ? `
                <div class="detail-row">
                    <div class="detail-label">Action Taken:</div>
                    <div class="detail-value">${report.action_taken}</div>
                </div>
                ` : ''}
                
                ${report.resolution_details ? `
                <div class="detail-row">
                    <div class="detail-label">Resolution:</div>
                    <div class="detail-value">${report.resolution_details}</div>
                </div>
                ` : ''}
                
                <div class="detail-row">
                    <div class="detail-label">Assigned Technician:</div>
                    <div class="detail-value">${report.technician_name || 'Unassigned'} ${report.technician_role === 'senior_technician' ? '(Senior)' : '(Technician)'}</div>
                </div>
                
                <div class="detail-row">
                    <div class="detail-label">Team Leader Acknowledged:</div>
                    <div class="detail-value">${report.team_leader_acknowledged ? 'Yes' : 'No'}</div>
                </div>
                
                ${report.team_leader_notes ? `
                <div class="detail-row">
                    <div class="detail-label">Team Leader Notes:</div>
                    <div class="detail-value">${report.team_leader_notes}</div>
                </div>
                ` : ''}
                
                ${imagesHtml}
            </div>
        `;
        
        document.getElementById('viewReportContent').innerHTML = html;
    }
    
    function printCurrentReport() {
        if (currentViewReport) {
            printReport(currentViewReport.id);
        }
    }
    
    function editCurrentReport() {
        if (currentViewReport) {
            window.location.href = `/reports?id=${currentViewReport.id}&edit=true`;
        }
    }
    
    function editReport(id) {
        window.location.href = `/reports?id=${id}&edit=true`;
    }
    
    async function deleteReport(id) {
        if (confirm('⚠️ Are you sure you want to delete this report?\n\nThis action cannot be undone. All data including images will be permanently removed.')) {
            try {
                const response = await fetch(`/api/technical-reports/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Report deleted successfully');
                    loadAllReports();
                } else {
                    showToast(data.error || 'Failed to delete report', 'error');
                }
            } catch (error) {
                console.error('Error deleting report:', error);
                showToast('Error deleting report', 'error');
            }
        }
    }
    
    async function printReport(id) {
        try {
            const response = await fetch('/api/technical-reports');
            const reports = await response.json();
            const report = reports.find(r => r.id === id);
            
            if (report) {
                currentPrintReport = report;
                document.getElementById('printContent').innerHTML = generatePrintHTML(report);
                
                const modal = new bootstrap.Modal(document.getElementById('printModal'));
                modal.show();
            }
        } catch (error) {
            showToast('Error loading report for printing', 'error');
        }
    }
    
    function generatePrintHTML(report) {
        const reportTypeIcon = report.report_type === 'water' ? '💧' : report.report_type === 'electricity' ? '⚡' : '📞';
        const reportTypeName = report.report_type === 'water' ? 'Water' : report.report_type === 'electricity' ? 'Electricity' : 'Telephone';
        
        return `
            <div class="print-area">
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 style="margin: 0; color: #9b59b6;">Ministry of Education, Brunei</h2>
                    <h3 style="margin: 5px 0; color: #666;">Technical Report System</h3>
                    <hr style="border-top: 2px solid #9b59b6;">
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <div><strong>Report ID:</strong> #${report.id}</div>
                    <div><strong>Date:</strong> ${formatDate(report.created_at)}</div>
                    <div><strong>Type:</strong> ${reportTypeName} ${reportTypeIcon}</div>
                </div>
                
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                    <tr style="background: #f5f5f5;">
                        <th style="padding: 10px; text-align: left; border: 1px solid #ddd; width: 30%;">Field</th>
                        <th style="padding: 10px; text-align: left; border: 1px solid #ddd;">Details</th>
                     </tr>
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Entity Type</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.entity_type === 'school' ? 'School' : 'Department'}</td></tr>
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Entity Name</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.entity_name || report.entity_type}</td></tr>
                    ${report.account_number ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Account Number</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.account_number}</td></tr>` : ''}
                    ${report.meter_number ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Meter Number</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.meter_number}</td></tr>` : ''}
                    ${report.phone_number ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Phone Number</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.phone_number}</td></tr>` : ''}
                    ${report.reference_number ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Reference</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.reference_type ? report.reference_type.toUpperCase() + ': ' : ''}${report.reference_number}${report.reference_date ? ' (' + report.reference_date + ')' : ''}</td></tr>` : ''}
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Problem Type</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.problem_type || '-'}</td></tr>
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Priority</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.priority.toUpperCase()}</td></tr>
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Status</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.status.replace('_', ' ').toUpperCase()}</td></tr>
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Complaint Details</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.complaint_details || '-'}</td></tr>
                    ${report.technician_notes ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Technician Notes</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.technician_notes}</td></tr>` : ''}
                    ${report.action_taken ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Action Taken</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.action_taken}</td></tr>` : ''}
                    ${report.resolution_details ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Resolution</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.resolution_details}</td></tr>` : ''}
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Assigned Technician</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.technician_name || 'Unassigned'}</td></tr>
                     <tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Team Leader Acknowledged</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.team_leader_acknowledged ? 'Yes' : 'No'}</td></tr>
                    ${report.team_leader_notes ? `<tr><td style="padding: 8px; border: 1px solid #ddd;"><strong>Team Leader Notes</strong></td><td style="padding: 8px; border: 1px solid #ddd;">${report.team_leader_notes}</td></tr>` : ''}
                </table>
                
                <div style="display: flex; justify-content: space-between; margin-top: 40px;">
                    <div style="text-align: center;">
                        <div style="border-top: 1px solid #000; width: 200px; margin-top: 30px; padding-top: 5px;"></div>
                        <div>Technician's Signature</div>
                        <div>Name: ${report.technician_name || '_________________'}</div>
                        <div>Date: ${formatDateOnly(new Date())}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="border-top: 1px solid #000; width: 200px; margin-top: 30px; padding-top: 5px;"></div>
                        <div>Team Leader's Signature</div>
                        <div>Name: _________________</div>
                        <div>Date: _________________</div>
                    </div>
                </div>
                
                <div style="margin-top: 30px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 10px; text-align: center;">
                    <small>This is an official report from the Ministry of Education, Brunei. Printed on ${formatDate(new Date())}</small>
                </div>
            </div>
        `;
    }
    
    function executePrint() {
        if (!currentPrintReport) return;
        
        const printContent = document.getElementById('printContent').innerHTML;
        
        const printWindow = window.open('', '_blank', 'width=900,height=700,scrollbars=yes');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Print Report #${currentPrintReport.id}</title>
                <style>
                    body {
                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                        margin: 0;
                        padding: 20px;
                    }
                    @media print {
                        body {
                            padding: 0;
                        }
                    }
                </style>
            </head>
            <body>
                ${printContent}
                <script>
                    window.onload = function() {
                        window.print();
                        setTimeout(function() {
                            window.close();
                        }, 1000);
                    };
                <\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
        
        fetch(`/api/technical-reports/${currentPrintReport.id}/track-print`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        }).catch(error => console.log('Print tracking failed:', error));
        
        const modal = bootstrap.Modal.getInstance(document.getElementById('printModal'));
        if (modal) modal.hide();
    }
    
    function exportReports() {
        let url = '/api/export-reports?';
        const type = document.getElementById('filterType').value;
        if (type) url += `&type=${type}`;
        window.location.href = url;
        showToast('Exporting reports...');
    }
    
    loadAllReports();
</script>
{% endblock %}
