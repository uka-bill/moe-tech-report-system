{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-briefcase"></i> Departments Management</h2>
    <button class="btn btn-primary" onclick="showAddDeptModal()">
        <i class="bi bi-plus-circle"></i> Add Department
    </button>
</div>

<div class="card">
    <div class="card-header">
        <i class="bi bi-list-ul"></i> Department Directory
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Department Name</th>
                        <th>Division</th>
                        <th>Code</th>
                        <th>Contact Person</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="departmentsTable">
                    <tr><td colspan="7" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit Department Modal -->
<div class="modal fade" id="deptModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deptModalTitle">Add Department</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="deptForm">
                    <input type="hidden" id="deptId">
                    <div class="mb-3">
                        <label class="form-label">Department Name *</label>
                        <input type="text" class="form-control" id="deptName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Division</label>
                        <input type="text" class="form-control" id="division">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department Code</label>
                        <input type="text" class="form-control" id="deptCode">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="deptAddress" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Person</label>
                        <input type="text" class="form-control" id="deptContactPerson">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Phone</label>
                        <input type="text" class="form-control" id="deptContactPhone">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveDepartment()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadDepartments() {
        try {
            const response = await fetch('/api/departments');
            const departments = await response.json();
            displayDepartments(departments);
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function displayDepartments(departments) {
        const tbody = document.getElementById('departmentsTable');
        if (!departments || departments.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No departments found</td></tr>';
            return;
        }
        
        tbody.innerHTML = departments.map(dept => `
            <tr>
                <td>${dept.id}</td>
                <td><strong>${dept.name}</strong></td>
                <td>${dept.division || '-'}</td>
                <td>${dept.department_code || '-'}</td>
                <td>${dept.contact_person || '-'}</td>
                <td>${dept.contact_phone || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="editDepartment(${dept.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteDepartment(${dept.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                 </td>
             </tr>
        `).join('');
    }
    
    function showAddDeptModal() {
        document.getElementById('deptModalTitle').textContent = 'Add Department';
        document.getElementById('deptForm').reset();
        document.getElementById('deptId').value = '';
        const modal = new bootstrap.Modal(document.getElementById('deptModal'));
        modal.show();
    }
    
    async function editDepartment(id) {
        const response = await fetch('/api/departments');
        const departments = await response.json();
        const dept = departments.find(d => d.id === id);
        
        if (dept) {
            document.getElementById('deptModalTitle').textContent = 'Edit Department';
            document.getElementById('deptId').value = dept.id;
            document.getElementById('deptName').value = dept.name || '';
            document.getElementById('division').value = dept.division || '';
            document.getElementById('deptCode').value = dept.department_code || '';
            document.getElementById('deptAddress').value = dept.address || '';
            document.getElementById('deptContactPerson').value = dept.contact_person || '';
            document.getElementById('deptContactPhone').value = dept.contact_phone || '';
            
            const modal = new bootstrap.Modal(document.getElementById('deptModal'));
            modal.show();
        }
    }
    
    async function saveDepartment() {
        const id = document.getElementById('deptId').value;
        const data = {
            name: document.getElementById('deptName').value,
            division: document.getElementById('division').value,
            department_code: document.getElementById('deptCode').value,
            address: document.getElementById('deptAddress').value,
            contact_person: document.getElementById('deptContactPerson').value,
            contact_phone: document.getElementById('deptContactPhone').value
        };
        
        if (!data.name) {
            showToast('Department name is required', 'error');
            return;
        }
        
        try {
            let response;
            if (id) {
                response = await fetch(`/api/departments/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } else {
                response = await fetch('/api/departments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            }
            
            const result = await response.json();
            if (result.success) {
                showToast(id ? 'Department updated' : 'Department added');
                bootstrap.Modal.getInstance(document.getElementById('deptModal')).hide();
                loadDepartments();
            } else {
                showToast(result.error || 'Failed to save', 'error');
            }
        } catch (error) {
            showToast('Error saving department', 'error');
        }
    }
    
    async function deleteDepartment(id) {
        if (confirm('Are you sure you want to delete this department?')) {
            try {
                const response = await fetch(`/api/departments/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    showToast('Department deleted');
                    loadDepartments();
                } else {
                    showToast(result.error || 'Cannot delete department with existing reports', 'error');
                }
            } catch (error) {
                showToast('Error deleting department', 'error');
            }
        }
    }
    
    loadDepartments();
</script>
{% endblock %}
