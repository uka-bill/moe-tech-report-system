{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-lightning-charge text-warning"></i> Electricity Reports</h2>
    <a href="{{ url_for('new_report') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> New Electricity Report
    </a>
</div>

<!-- Similar filter structure as water_reports.html but with electricity-specific content -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="filterStatus">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Priority</label>
                <select class="form-select" id="filterPriority">
                    <option value="">All</option>
                    <option value="high">High (Emergency)</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Entity Type</label>
                <select class="form-select" id="filterEntityType">
                    <option value="">All</option>
                    <option value="school">School</option>
                    <option value="department">Department</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-primary w-100" onclick="loadElectricityReports()">
                    <i class="bi bi-search"></i> Apply Filters
                </button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="bi bi-list-ul"></i> Electricity Issue Reports
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Location</th>
                        <th>Problem</th>
                        <th>Account/Meter</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Acknowledged</th>
                        <th>Technician</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="electricityReportsTable">
                    <tr><td colspan="10" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadElectricityReports() {
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const entityType = document.getElementById('filterEntityType').value;
        
        let url = '/api/technical-reports?type=electricity';
        if (status) url += `&status=${status}`;
        if (priority) url += `&priority=${priority}`;
        if (entityType) url += `&entity_type=${entityType}`;
        
        try {
            const response = await fetch(url);
            const reports = await response.json();
            displayElectricityReports(reports);
        } catch (error) {
            console.error('Error loading electricity reports:', error);
        }
    }
    
    function displayElectricityReports(reports) {
        const tbody = document.getElementById('electricityReportsTable');
        if (!reports || reports.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center">No electricity reports found</td></tr>';
            return;
        }
        
        tbody.innerHTML = reports.map(report => `
            <tr class="report-type-electricity">
                <td>#${report.id}</td>
                <td><strong>${report.entity_name || report.entity_type}</strong><br><small>${report.entity_type}</small></td>
                <td><strong>${report.problem_type}</strong><br><small>${(report.complaint_details || '').substring(0, 50)}...</small></td>
                <td>${report.account_number || report.meter_number || '-'}</td>
                <td><span class="status-badge priority-${report.priority}">${report.priority}</span></td>
                <td><span class="status-badge status-${report.status}">${report.status}</span></td>
                <td>${report.team_leader_acknowledged ? '✓' : '✗'}</td>
                <td>${report.technician_name || '-'}</td>
                <td>${formatDate(report.created_at)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="viewReport(${report.id})">
                        <i class="bi bi-eye"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }
    
    function viewReport(id) {
        window.location.href = `/reports?id=${id}`;
    }
    
    loadElectricityReports();
</script>
{% endblock %}
