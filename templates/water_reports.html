{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-droplet text-info"></i> Water Reports</h2>
    <a href="{{ url_for('new_report') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> New Water Report
    </a>
</div>

<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="filterStatus">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Priority</label>
                <select class="form-select" id="filterPriority">
                    <option value="">All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Entity Type</label>
                <select class="form-select" id="filterEntityType">
                    <option value="">All</option>
                    <option value="school">School</option>
                    <option value="department">Department</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-primary w-100" onclick="loadWaterReports()">
                    <i class="bi bi-search"></i> Apply Filters
                </button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="bi bi-list-ul"></i> Water Issue Reports
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Utility #</th>
                        <th>ID</th>
                        <th>Location</th>
                        <th>Problem Type</th>
                        <th>Problem Details</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Acknowledged</th>
                        <th>Technician</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="waterReportsTable">
                    <tr><td colspan="11" class="text-center">Loading...</td</tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let allTechnicians = [];
    
    // Format date for Brunei Time
    function formatDate(dateString) {
        if (!dateString) return '-';
        try {
            const date = new Date(dateString);
            date.setHours(date.getHours() + 8);
            return date.toLocaleString('en-GB', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (e) {
            return dateString;
        }
    }
    
    function getUtilityLetter(type) {
        switch(type) {
            case 'water': return 'W';
            case 'electricity': return 'E';
            case 'telephone': return 'T';
            default: return '';
        }
    }
    
    function formatUtilityNumber(report) {
        const letter = getUtilityLetter(report.report_type);
        const number = report.utility_number || report.id;
        return `${letter}-${String(number).padStart(3, '0')}`;
    }
    
    async function loadWaterReports() {
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const entityType = document.getElementById('filterEntityType').value;
        
        let url = '/api/technical-reports?type=water';
        if (status) url += `&status=${status}`;
        if (priority) url += `&priority=${priority}`;
        if (entityType) url += `&entity_type=${entityType}`;
        
        try {
            const response = await fetch(url);
            const reports = await response.json();
            displayWaterReports(reports);
        } catch (error) {
            console.error('Error loading water reports:', error);
            showToast('Error loading reports', 'error');
        }
    }
    
    function displayWaterReports(reports) {
        const tbody = document.getElementById('waterReportsTable');
        if (!reports || reports.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" class="text-center">No water reports found</td<tr>';
            return;
        }
        
        tbody.innerHTML = reports.map(report => {
            const utilityNumber = formatUtilityNumber(report);
            return `
                <tr class="report-type-water">
                    <td><span class="utility-number">${utilityNumber}</span></td>
                    <td>#${report.id}</td>
                    <td><strong>${report.entity_name || report.entity_type}</strong><br><small>${report.entity_type}</small></td>
                    <td>${report.problem_type || '-'}</td>
                    <td>${(report.complaint_details || '').substring(0, 60)}${(report.complaint_details || '').length > 60 ? '...' : ''}</td>
                    <td><span class="status-badge priority-${report.priority}">${report.priority}</span></td>
                    <td><span class="status-badge status-${report.status}">${report.status.replace('_', ' ')}</span></td>
                    <td>${report.team_leader_acknowledged ? '<span class="acknowledged-badge">✓ Acknowledged</span>' : '<span class="unacknowledged-badge">✗ Pending</span>'}</td>
                    <td>${report.technician_name || '-'}</td>
                    <td>${formatDate(report.created_at)}</br><small>${formatDate(report.created_at).split(',')[0]}</small></td>
                    <td>
                        <button class="btn btn-sm btn-outline-info" onclick="viewReport(${report.id})">
                            <i class="bi bi-eye"></i>
                        </button>
                    </td>
                </table>
            `;
        }).join('');
    }
    
    function viewReport(id) {
        window.location.href = `/reports?id=${id}`;
    }
    
    loadWaterReports();
    setInterval(loadWaterReports, 30000);
</script>
{% endblock %}
