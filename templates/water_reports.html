{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-droplet text-info"></i> Water Reports</h2>
    <a href="{{ url_for('new_report') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> New Water Report
    </a>
</div>

<!-- Filters -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="filterStatus">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Priority</label>
                <select class="form-select" id="filterPriority">
                    <option value="">All</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Entity Type</label>
                <select class="form-select" id="filterEntityType">
                    <option value="">All</option>
                    <option value="school">School</option>
                    <option value="department">Department</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-primary w-100" onclick="loadWaterReports()">
                    <i class="bi bi-search"></i> Apply Filters
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Reports Table -->
<div class="card">
    <div class="card-header">
        <i class="bi bi-list-ul"></i> Water Issue Reports
        <button class="btn btn-sm btn-outline-secondary float-end" onclick="exportReports()">
            <i class="bi bi-download"></i> Export
        </button>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Location</th>
                        <th>Problem</th>
                        <th>Account/Meter</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Acknowledged</th>
                        <th>Technician</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="waterReportsTable">
                    <tr>
                        <td colspan="10" class="text-center">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- View Report Modal -->
<div class="modal fade" id="viewReportModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Water Report Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="reportDetails">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="editCurrentReport()">Edit Report</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentReportData = null;
    
    async function loadWaterReports() {
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;
        const entityType = document.getElementById('filterEntityType').value;
        
        let url = '/api/technical-reports?type=water';
        if (status) url += `&status=${status}`;
        if (priority) url += `&priority=${priority}`;
        if (entityType) url += `&entity_type=${entityType}`;
        
        try {
            const response = await fetch(url);
            const reports = await response.json();
            displayWaterReports(reports);
        } catch (error) {
            console.error('Error loading water reports:', error);
            showToast('Error loading reports', 'error');
        }
    }
    
    function displayWaterReports(reports) {
        const tbody = document.getElementById('waterReportsTable');
        if (!reports || reports.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center">No water reports found</td></tr>';
            return;
        }
        
        tbody.innerHTML = reports.map(report => `
            <tr class="report-type-water">
                <td>#${report.id}</td>
                <td>
                    <strong>${report.entity_name || `${report.entity_type} #${report.entity_id}`}</strong>
                    <br><small class="text-muted">${report.entity_type}</small>
                </td>
                <td>
                    <strong>${report.problem_type || '-'}</strong>
                    <br><small class="text-muted">${(report.complaint_details || '').substring(0, 60)}${(report.complaint_details || '').length > 60 ? '...' : ''}</small>
                </td>
                <td>
                    ${report.account_number ? `Account: ${report.account_number}<br>` : ''}
                    ${report.meter_number ? `Meter: ${report.meter_number}` : ''}
                </td>
                <td><span class="status-badge priority-${report.priority}">${report.priority}</span></td>
                <td><span class="status-badge status-${report.status}">${report.status.replace('_', ' ')}</span></td>
                <td>${report.team_leader_acknowledged ? '<span class="acknowledged-badge"><i class="bi bi-check-circle"></i> Yes</span>' : '<span class="unacknowledged-badge"><i class="bi bi-exclamation-circle"></i> No</span>'}</td>
                <td>${report.technician_name || '-'}</td>
                <td>${formatDate(report.created_at)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="viewWaterReport(${report.id})">
                        <i class="bi bi-eye"></i>
                    </button>
                    ${!report.team_leader_acknowledged && isTeamLeader() ? `
                    <button class="btn btn-sm btn-outline-success" onclick="acknowledgeWaterReport(${report.id})">
                        <i class="bi bi-check2-square"></i>
                    </button>
                    ` : ''}
                </td>
            </tr>
        `).join('');
    }
    
    async function viewWaterReport(id) {
        const response = await fetch(`/api/technical-reports`);
        const reports = await response.json();
        currentReportData = reports.find(r => r.id === id);
        
        if (currentReportData) {
            const modal = new bootstrap.Modal(document.getElementById('viewReportModal'));
            document.getElementById('reportDetails').innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <h6>Report Information</h6>
                        <table class="table table-sm">
                            <tr><th>Report ID:</th><td>#${currentReportData.id}</td></tr>
                            <tr><th>Report Type:</th><td><span class="badge bg-info">Water</span></td></tr>
                            <tr><th>Location:</th><td>${currentReportData.entity_name || currentReportData.entity_type}</td></tr>
                            <tr><th>Problem Type:</th><td>${currentReportData.problem_type || '-'}</td></tr>
                            <tr><th>Priority:</th><td><span class="status-badge priority-${currentReportData.priority}">${currentReportData.priority}</span></td></tr>
                            <tr><th>Status:</th><td><span class="status-badge status-${currentReportData.status}">${currentReportData.status}</span></td></tr>
                            <tr><th>Technician:</th><td>${currentReportData.technician_name || '-'}</td></tr>
                            <tr><th>Created:</th><td>${formatDate(currentReportData.created_at)}</td></tr>
                            <tr><th>Updated:</th><td>${formatDate(currentReportData.updated_at)}</td></tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h6>Account Details</h6>
                        <table class="table table-sm">
                            <tr><th>Account Number:</th><td>${currentReportData.account_number || '-'}</td></tr>
                            <tr><th>Meter Number:</th><td>${currentReportData.meter_number || '-'}</td></tr>
                        </table>
                        
                        <h6 class="mt-3">Team Leader Status</h6>
                        <table class="table table-sm">
                            <tr><th>Acknowledged:</th><td>${currentReportData.team_leader_acknowledged ? 'Yes' : 'No'}</td></tr>
                            <tr><th>Acknowledged At:</th><td>${formatDate(currentReportData.team_leader_acknowledged_at)}</td></tr>
                            <tr><th>Team Leader Notes:</th><td>${currentReportData.team_leader_notes || '-'}</td></tr>
                        </table>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <h6>Complaint Details</h6>
                        <p>${currentReportData.complaint_details || '-'}</p>
                        
                        <h6>Technician Notes</h6>
                        <p>${currentReportData.technician_notes || '-'}</p>
                        
                        <h6>Action Taken</h6>
                        <p>${currentReportData.action_taken || '-'}</p>
                        
                        <h6>Resolution Details</h6>
                        <p>${currentReportData.resolution_details || '-'}</p>
                        
                        ${currentReportData.images && currentReportData.images.length > 0 ? `
                        <h6>Images</h6>
                        <div class="d-flex flex-wrap gap-2">
                            ${currentReportData.images.map(img => `<img src="${img}" class="image-preview" onclick="window.open('${img}')">`).join('')}
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            modal.show();
        }
    }
    
    function editCurrentReport() {
        if (currentReportData) {
            window.location.href = `/reports?id=${currentReportData.id}&edit=true`;
        }
    }
    
    async function acknowledgeWaterReport(id) {
        const notes = prompt('Enter acknowledgment notes (optional):');
        try {
            const response = await fetch(`/api/technical-reports/${id}/acknowledge`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    team_leader_id: getCurrentUser().id,
                    team_leader_notes: notes || ''
                })
            });
            const data = await response.json();
            if (data.success) {
                showToast('Report acknowledged successfully');
                loadWaterReports();
            } else {
                showToast(data.error || 'Failed to acknowledge', 'error');
            }
        } catch (error) {
            showToast('Error acknowledging report', 'error');
        }
    }
    
    function exportReports() {
        const status = document.getElementById('filterStatus').value;
        let url = '/api/export-reports?type=water';
        if (status) url += `&status=${status}`;
        window.location.href = url;
        showToast('Export started');
    }
    
    // Load reports on page load
    loadWaterReports();
    setInterval(loadWaterReports, 30000);
</script>
{% endblock %}
