{% extends "base.html" %}

{% block content %}
<style>
    :root {
        --primary-color: #9b59b6;
        --primary-dark: #8e44ad;
        --primary-light: #d4b8e8;
        --secondary-color: #f3e5f5;
    }

    .page-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
        border-radius: 16px;
        padding: 20px 25px;
        margin-bottom: 25px;
        color: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .page-header h2 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .page-header h2 i {
        margin-right: 12px;
    }
    .page-header p {
        margin: 8px 0 0;
        opacity: 0.9;

    .stats-badge {

    .date-filter-select {

        cursor: pointer;

    }
    .btn-clear:hover, .btn-clear-filters:hover {
        transform: translateY(-1px);

    /* Statistics Cards */
    .stat-card {
        background: white;
        border-radius: 16px;
        padding: 15px 20px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);

    }

    .modal-fullscreen .modal-body {

    }

    }
    .report-detail-container .row {

    }
    .image-preview-large {
        max-width: 100%;

        object-fit: contain;

        cursor: pointer;

    }
    .image-preview-large:hover {

    .comment-section {

        background: white;

    }
    .comment-author {

    }
    .comment-date {

        color: #6c757d;

    }
    .modal-header-custom {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);

    .btn-secondary-custom {

        border-radius: 8px;
        padding: 6px 14px;

        transition: all 0.2s;

    }
    .btn-secondary-custom:hover {

    }
    .btn-print {
        background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
        border: none;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 11px;
        transition: all 0.2s;
        color: white;
    }
    .btn-print:hover {
        transform: translateY(-1px);
    }
</style>

<script>
    let currentReport = null;
    let currentReportId = null;
    let currentTechnicianId = null;
    let allReports = [];
    let isModalExpanded = false;
    let currentFilterMonth = 'all';
    let currentFilterYear = 'all';
    
    function formatDate(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        date.setHours(date.getHours() + 8);
        return date.toLocaleString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    
    function formatDateOnly(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        date.setHours(date.getHours() + 8);
        return date.toLocaleDateString('en-GB');
    }
    
    function getMonthYear(dateString) {
        if (!dateString) return { month: 0, year: 0 };
        const date = new Date(dateString);
        return { month: date.getMonth() + 1, year: date.getFullYear() };
    }
    
    function getMonthName(month) {
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        return months[month - 1] || '';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function cleanText(text) {
        if (!text) return '';
        let cleaned = String(text);
        cleaned = cleaned.replace(/NonNullable/gi, '');
        cleaned = cleaned.replace(/Non-Nullable/gi, '');
        cleaned = cleaned.replace(/null/gi, '');
        cleaned = cleaned.replace(/undefined/gi, '');
        return cleaned.trim();
    }
    
    function toggleModalSize() {
        const modalDialog = document.querySelector('#reportModal .modal-dialog');
        const expandBtn = document.getElementById('expandModalBtn');
        if (isModalExpanded) {
            modalDialog.classList.remove('modal-fullscreen');
            modalDialog.classList.add('modal-xl');
            expandBtn.innerHTML = '<i class="bi bi-arrows-fullscreen"></i>';
            isModalExpanded = false;
        } else {
            modalDialog.classList.remove('modal-xl');
            modalDialog.classList.add('modal-fullscreen');
            expandBtn.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
            isModalExpanded = true;
        }
    }
    
    function getImageUrl(imgPath) {
        if (!imgPath) return '';
        if (imgPath.startsWith('http')) return imgPath;
        return window.location.origin + (imgPath.startsWith('/') ? imgPath : '/' + imgPath);
    }
    
    async function getCurrentTechnician() {
        const userId = localStorage.getItem('userId');
        if (userId && userId !== 'temp') {
            currentTechnicianId = parseInt(userId);
        } else {
            const response = await fetch('/api/technicians');
            const techs = await response.json();
            const userName = localStorage.getItem('userName');
            const tech = techs.find(t => t.name === userName);
            if (tech) currentTechnicianId = tech.id;
        }
    }
    
    function applyDateFilter() {
        currentFilterMonth = document.getElementById('filterMonth').value;
        currentFilterYear = document.getElementById('filterYear').value;
        applyFilters();
        
        const dateFilterInfo = document.getElementById('dateFilterInfo');
        if (currentFilterMonth !== 'all' && currentFilterYear !== 'all') {
            const monthName = getMonthName(parseInt(currentFilterMonth));
            dateFilterInfo.innerHTML = `<i class="bi bi-calendar-check"></i> Showing ${monthName} ${currentFilterYear}`;
            dateFilterInfo.style.display = 'inline-block';
        } else if (currentFilterYear !== 'all') {
            dateFilterInfo.innerHTML = `<i class="bi bi-calendar-check"></i> Showing year ${currentFilterYear}`;
            dateFilterInfo.style.display = 'inline-block';
        } else if (currentFilterMonth !== 'all') {
            const monthName = getMonthName(parseInt(currentFilterMonth));
            dateFilterInfo.innerHTML = `<i class="bi bi-calendar-check"></i> Showing ${monthName} (all years)`;
            dateFilterInfo.style.display = 'inline-block';
        } else {
            dateFilterInfo.style.display = 'none';
        }
    }
    
    function clearDateFilter() {
        document.getElementById('filterMonth').value = 'all';
        document.getElementById('filterYear').value = 'all';
        currentFilterMonth = 'all';
        currentFilterYear = 'all';
        document.getElementById('dateFilterInfo').style.display = 'none';
        applyFilters();
    }
    
    function clearFilters() {
        document.getElementById('filterType').value = 'all';
        document.getElementById('filterStatus').value = 'all';
        document.getElementById('searchInput').value = '';
        clearDateFilter();
    }
    
    function applyFilters() {
        const reportType = document.getElementById('filterType').value;
        const status = document.getElementById('filterStatus').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filterMonth = currentFilterMonth;
        const filterYear = currentFilterYear;
        
        let filtered = [...allReports];
        
        if (filterMonth !== 'all' || filterYear !== 'all') {
            filtered = filtered.filter(r => {
                const { month, year } = getMonthYear(r.created_at);
                let match = true;
                if (filterMonth !== 'all') match = match && month == filterMonth;
                if (filterYear !== 'all') match = match && year == filterYear;
                return match;
            });
        }
        
        if (reportType !== 'all') {
            filtered = filtered.filter(r => r.report_type === reportType);
        }
        
        if (status !== 'all') {
            if (status === 'pending') filtered = filtered.filter(r => !r.team_leader_acknowledged);
            if (status === 'acknowledged') filtered = filtered.filter(r => r.team_leader_acknowledged);
        }
        
        if (searchTerm) {
            filtered = filtered.filter(r => 
                (r.entity_name && r.entity_name.toLowerCase().includes(searchTerm)) ||
                (r.problem_type && r.problem_type.toLowerCase().includes(searchTerm)) ||
                r.id.toString().includes(searchTerm) ||
                (r.reference_number && r.reference_number.toLowerCase().includes(searchTerm))
            );
        }
        
        const total = filtered.length;
        const pending = filtered.filter(r => !r.team_leader_acknowledged).length;
        const acknowledged = filtered.filter(r => r.team_leader_acknowledged).length;
        
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statPending').textContent = pending;
        document.getElementById('statAcknowledged').textContent = acknowledged;
        document.getElementById('pendingCount').textContent = pending;
        
        displayReports(filtered);
    }
    
    async function loadReports() {
        const container = document.getElementById('reportsContainer');
        container.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary spinner-border-sm"></div><p class="mt-2 small">Loading reports...</p></div>';
        
        try {
            const response = await fetch(`/api/technical-reports?technician_id=${currentTechnicianId}`);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            allReports = await response.json();
            if (!allReports) allReports = [];
            
            applyFilters();
        } catch (error) {
            console.error('Error loading reports:', error);
            container.innerHTML = `
                <div class="text-center py-4 text-danger">
                    <i class="bi bi-exclamation-triangle"></i>
                    <p class="small">Error loading reports: ${error.message}</p>
                    <button class="btn-primary-custom btn-sm mt-2" onclick="loadReports()">Try Again</button>
                </div>
            `;
        }
    }
    
    function displayReports(reports) {
        const container = document.getElementById('reportsContainer');
        
        if (reports.length === 0) {
            container.innerHTML = `
                <div class="empty-section">
                    <i class="bi bi-inbox" style="font-size: 48px; color: #ccc;"></i>
                    <h5 class="mt-2">No Reports Found</h5>
                    <p class="small text-muted">You have not submitted any reports yet.</p>
                    <a href="/new-report" class="btn-primary-custom btn-sm mt-2">Create New Report</a>
                </div>
            `;
            return;
        }
        
        const waterReports = reports.filter(r => r.report_type === 'water');
        const electricityReports = reports.filter(r => r.report_type === 'electricity');
        const telephoneReports = reports.filter(r => r.report_type === 'telephone');
        
        const buildTable = (reportList, typeName, typeIcon) => {
            if (reportList.length === 0) return '';
            
            const groupByTechnician = (list) => {
                const groups = {};
                list.forEach(report => {
                    const techId = report.technician_id;
                    const techName = report.technician_name || 'Unknown';
                    if (!groups[techId]) {
                        groups[techId] = {
                            id: techId,
                            name: techName,
                            reports: []
                        };
                    }
                    groups[techId].reports.push(report);
                });
                return Object.values(groups);
            };
            
            const groups = groupByTechnician(reportList);
            
            let tableHtml = `<div class="category-container">
                <div class="section-header" onclick="toggleSection('${typeName}-body', this)">
                    <div class="section-title">
                        <span>${typeIcon}</span>
                        <span>${typeName} Reports</span>
                        <span class="section-count">${reportList.length}</span>
                    </div>
                    <div class="section-toggle-icon">
                        <i class="bi bi-chevron-down"></i>
                    </div>
                </div>
                <div id="${typeName}-body" class="reports-table-wrapper" style="display: none;">
                    <table class="reports-table">
                        <thead>
                            <tr>
                                <th style="width: 50px;">ID</th>
                                <th style="min-width: 120px;">Entity Name</th>
                                <th style="min-width: 100px;">Reference Number</th>
                                <th style="min-width: 80px;">Reference Date</th>
                                <th style="min-width: 130px;">Problem Type</th>
                                <th style="width: 65px;">Priority</th>
                                <th style="width: 85px;">Status</th>
                                <th style="width: 75px;">Date</th>
                                <th style="width: 100px;">Actions</th>
                            </table>
                        </thead>
                        <tbody>`;
            
            groups.forEach(group => {
                tableHtml += `<tr class="group-header-row">
                                <td colspan="9">
                                    <i class="bi bi-person-circle"></i> <strong>${escapeHtml(group.name)}</strong> 
                                    <span style="font-size: 10px; font-weight: normal; margin-left: 8px;">(${group.reports.length} report${group.reports.length !== 1 ? 's' : ''})</span>
                                  </td>
                                </tr>`;
                
                group.reports.forEach(report => {
                    const priorityClass = `priority-${report.priority}`;
                    const priorityIcon = report.priority === 'high' ? '🔴' : (report.priority === 'medium' ? '🟡' : '🟢');
                    const isAcknowledged = report.team_leader_acknowledged;
                    const statusHtml = isAcknowledged ? '<span class="status-acknowledged">✓ Acknowledged</span>' : '<span class="status-pending">⏳ Pending</span>';
                    const isChecked = report.checked_by_assistant === true;
                    const canEdit = !isAcknowledged;
                    
                    tableHtml += `
                        <tr onclick="openReportDetail(${report.id})">
                            <td><span class="report-id-link">#${report.id}</span>${isChecked ? ' <span class="checked-badge"><i class="bi bi-eye"></i></span>' : ''}</td>
                            <td class="entity-name" title="${escapeHtml(report.entity_name || report.entity_type)}">${escapeHtml(report.entity_name || report.entity_type)}</td
                            <td class="reference-number-cell" title="${escapeHtml(report.reference_number || '-')}">${escapeHtml(report.reference_number || '-')}</td
                            <td class="reference-date-cell" title="${escapeHtml(report.reference_date || '-')}">${escapeHtml(report.reference_date || '-')}</td
                            <td class="problem-type" title="${escapeHtml(report.problem_type || '-')}">${escapeHtml(report.problem_type || '-')}</td
                            <td class="${priorityClass}"><span class="priority-icon">${priorityIcon}</span> ${report.priority.toUpperCase()}</td
                            <td>${statusHtml}</td
                            <td class="date-cell">${formatDateOnly(report.created_at)}</td
                            <td>
                                ${canEdit ? `<button class="btn-edit" onclick="event.stopPropagation(); editReportDirect(${report.id})"><i class="bi bi-pencil"></i> Edit</button>` : ''}
                                <button class="btn-delete" onclick="event.stopPropagation(); deleteReportDirect(${report.id})"><i class="bi bi-trash"></i> Delete</button>
                              </td
                            </tr>
                    `;
                });
            });
            
            tableHtml += `</tbody>
                    60
                </div>
            </div>`;
            
            return tableHtml;
        };
        
        let allTablesHtml = '';
        allTablesHtml += buildTable(waterReports, 'Water', '💧');
        allTablesHtml += buildTable(electricityReports, 'Electricity', '⚡');
        allTablesHtml += buildTable(telephoneReports, 'Telephone', '📞');
        
        container.innerHTML = allTablesHtml;
    }
    
    function toggleSection(bodyId, element) {
        const body = document.getElementById(bodyId);
        const icon = element.querySelector('.section-toggle-icon');
        if (body.style.display === 'none') {
            body.style.display = 'block';
            icon.innerHTML = '<i class="bi bi-chevron-up"></i>';
        } else {
            body.style.display = 'none';
            icon.innerHTML = '<i class="bi bi-chevron-down"></i>';
        }
    }
    
    async function openReportDetail(id) {
        currentReportId = id;
        try {
            const response = await fetch('/api/technical-reports');
            const reports = await response.json();
            currentReport = reports.find(r => r.id === id);
            if (currentReport) {
                displayReportModal();
                const editBtn = document.getElementById('editBtn');
                const deleteBtn = document.getElementById('deleteBtn');
                if (editBtn) {
                    editBtn.style.display = currentReport.team_leader_acknowledged ? 'none' : 'inline-block';
                }
                if (deleteBtn) {
                    deleteBtn.style.display = currentReport.team_leader_acknowledged ? 'none' : 'inline-block';
                }
                
                if (isModalExpanded) {
                    const modalDialog = document.querySelector('#reportModal .modal-dialog');
                    const expandBtn = document.getElementById('expandModalBtn');
                    if (modalDialog) {
                        modalDialog.classList.remove('modal-fullscreen');
                        modalDialog.classList.add('modal-xl');
                        expandBtn.innerHTML = '<i class="bi bi-arrows-fullscreen"></i>';
                        isModalExpanded = false;
                    }
                }
                
                new bootstrap.Modal(document.getElementById('reportModal')).show();
            }
        } catch (error) { 
            window.showToast('Error loading report', 'error'); 
        }
    }

    function showAddCommentModal() { 
        document.getElementById('newComment').value = ''; 
        new bootstrap.Modal(document.getElementById('commentModal')).show(); 
    }
    
    async function submitComment() {
        const comment = document.getElementById('newComment').value;
        const userName = localStorage.getItem('userName') || 'Technician';
        if (!comment.trim()) return window.showToast('Enter a comment', 'error');
        try {
            let comments = currentReport.comments || [];
            comments.push({ author: userName, text: comment, created_at: new Date().toISOString() });
            const response = await fetch(`/api/technical-reports/${currentReportId}`, { 
                method: 'PUT', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ comments: comments }) 
            });
            const data = await response.json();
            if (data.success) { 
                window.showToast('Comment added'); 
                bootstrap.Modal.getInstance(document.getElementById('commentModal')).hide(); 
                openReportDetail(currentReportId); 
            }
        } catch (error) { 
            window.showToast('Error', 'error'); 
        }
    }
    
    function editReportDirect(id) {
        window.location.href = `/new-report?id=${id}`;
    }
    
    function editReport() { 
        if (currentReportId) {
            if (currentReport && currentReport.team_leader_acknowledged) {
                window.showToast('This report has already been acknowledged and cannot be edited', 'error');
                return;
            }
            window.location.href = `/new-report?id=${currentReportId}`;
        } else {
            window.showToast('No report selected', 'error');
        }
    }
    
    async function deleteReportDirect(id) {
        if (!confirm('Are you sure you want to delete your report? This action cannot be undone.')) return;
        try {
            const response = await fetch(`/api/technical-reports/${id}`, { method: 'DELETE' });
            const data = await response.json();
            if (data.success) { 
                window.showToast('Report deleted'); 
                loadReports(); 
                bootstrap.Modal.getInstance(document.getElementById('reportModal'))?.hide(); 
            } else { 
                window.showToast(data.error || 'Cannot delete', 'error'); 
            }
        } catch (error) { 
            window.showToast('Error deleting', 'error'); 
        }
    }
    
    function deleteReport() { 
        if (currentReport && currentReport.team_leader_acknowledged) {
            window.showToast('This report has already been acknowledged and cannot be deleted', 'error');
            return;
        }
        deleteReportDirect(currentReportId); 
    }
    
    function printReport() {
        if (!currentReport) {
            window.showToast('No report to print', 'error');
            return;
        }
        
        fetch(`/api/technical-reports/${currentReport.id}/track-print`, { method: 'POST' }).catch(e => console.log(e));
        
        const printWindow = window.open('', '_blank', 'width=900,height=700');
        printWindow.document.write(generatePrintHTML(currentReport));
        printWindow.document.close();
    }

            .footer{text-align:center;margin-top:40px;font-size:9pt;color:#666;border-top:1px solid #ddd;padding-top:12px}
            @media print{body{padding:0;margin:0}table{page-break-inside:avoid}}
        </style>
        </head>
        <body>
            <div class="report-container">
                <div class="header">
                    <h2>Unit Kemudahan Asas</h2>
                    <h2>Department of Administration and Services</h2>
                    <h1>Ministry of Education</h1>
                    <div class="divider"></div><div class="sub-divider"></div>
                    <h3 style="margin-top:12px;font-size:13pt;">Technical Report System - ${reportTypeName}</h3>
                </div>
                
                <div class="report-id">
                    <div><strong>Report ID:</strong> #${report.id}</div>
                    <div><strong>Date:</strong> ${formatDate(report.created_at)}</div>
                    <div><strong>Type:</strong> ${reportTypeName} ${reportTypeIcon}</div>
                    <div><strong>Status:</strong> ${report.team_leader_acknowledged ? 'Acknowledged' : 'Pending Review'}</div>
                </div>
                
                <table>
                    <tr><th>Entity Type</th><td>${report.entity_type === 'school' ? 'School' : 'Department'}  </td</tr>
                    <tr><th>Entity Name</th><td>${escapeHtml(entityName)}</td</tr>
                    ${referenceNumber ? `<tr><th>Reference Number</th><td>${escapeHtml(referenceNumber)}</td</tr>` : ''}
                    ${referenceDate ? `<tr><th>Reference Date</th><td>${escapeHtml(referenceDate)}</td</tr>` : ''}
                    ${accountNumber ? `<tr><th>Account Number</th><td>${escapeHtml(accountNumber)}</td</tr>` : ''}
                    ${meterNumber ? `<tr><th>Meter Number</th><td>${escapeHtml(meterNumber)}</td</tr>` : ''}
                    ${phoneNumber ? `<tr><th>Phone Number</th><td>${escapeHtml(phoneNumber)}</td</tr>` : ''}
                    <tr><th>Problem Type</th><td>${escapeHtml(problemType)}</td</tr>
                    <tr><th>Priority</th><td class="priority-${report.priority}">${report.priority.toUpperCase()} ${report.priority_with_tender ? '<span class="bg-danger">TENDER</span>' : ''}</td</tr>
                    <tr><th>Complaint Details</th><td style="white-space:pre-wrap;">${complaintDetails}</td</tr>
                    ${technicianNotes ? `<tr><th>Technician's Notes</th><td style="white-space:pre-wrap;">${escapeHtml(technicianNotes)}</td</tr>` : ''}
                    ${actionTaken && actionTaken !== '-' && actionTaken !== '' ? `<tr><th>Action Taken</th><td style="white-space:pre-wrap;">${actionTaken}</td</tr>` : ''}
                    <tr><th>Submitted By</th><td>${escapeHtml(technicianName)}</td</tr>
                    ${assistantCheckHtml}
                    ${report.team_leader_acknowledged ? `<tr><th>Acknowledged By</th><td>${escapeHtml(teamLeaderName)} on ${formatDate(report.team_leader_acknowledged_at)}</td</tr>` : ''}
                    ${teamLeaderNotes ? `<tr><th>Team Leader Notes</th><td style="white-space:pre-wrap;">${escapeHtml(teamLeaderNotes)}</td</tr>` : ''}
                </table>
                
                ${imagesHtml}
                ${commentsHtml}
                
                <div class="signatures">
                    <div class="signature-box">
                        <div class="signature-line"></div>
                        <div><strong>Technician's Signature</strong></div>
                        <div>Name: ${escapeHtml(technicianName)}</div>
                        <div>Date: ${formatDateOnly(new Date())}</div>
                    </div>
                    <div class="signature-box">
                        <div class="signature-line"></div>
                        <div><strong>Team Leader's Signature</strong></div>
                        <div>Name: ${report.team_leader_acknowledged ? escapeHtml(teamLeaderName) : '_________________'}</div>
                        <div>Date: ${report.team_leader_acknowledged ? formatDateOnly(report.team_leader_acknowledged_at) : '_________________'}</div>
                    </div>
                </div>
                
                <div class="footer">
                    <p>This is an official technical report from Unit Kemudahan Asas, Ministry of Education, Brunei Darussalam.</p>
                    <p>Printed on: ${currentDate}</p>
                </div>
            </div>
            <script>
                window.onload = function() { window.print(); setTimeout(function() { window.close(); }, 1000); };
            <\/script>
        </body>
        </html>`;
    }
    
    async function init() { 
        await getCurrentTechnician(); 
        await loadReports(); 
        setInterval(loadReports, 30000); 
    }
    init();
</script>
{% endblock %}
