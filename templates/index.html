<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKA Technical Report System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background shapes */
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            right: -100px;
            animation-delay: 5s;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            top: 50%;
            left: 10%;
            animation-delay: 10s;
        }

        .shape-4 {
            width: 250px;
            height: 250px;
            bottom: 20%;
            right: 5%;
            animation-delay: 15s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            33% {
                transform: translateY(-30px) translateX(20px) rotate(120deg);
            }
            66% {
                transform: translateY(30px) translateX(-20px) rotate(240deg);
            }
        }

        /* Main splash card */
        .splash-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            font-size: 64px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .ministry-title {
            font-size: 14px;
            letter-spacing: 2px;
            color: #764ba2;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .system-title {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .system-subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .brunei-flag {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .flag-bar {
            width: 40px;
            height: 4px;
            border-radius: 2px;
        }

        .flag-yellow { background-color: #FFD700; }
        .flag-black { background-color: #000000; }
        .flag-white { background-color: #FFFFFF; border: 1px solid #ddd; }
        .flag-red { background-color: #DC143C; }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-dashboard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-report {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-report:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .version-info {
            margin-top: 30px;
            font-size: 11px;
            color: #95a5a6;
        }

        @media (max-width: 576px) {
            .splash-card {
                padding: 30px 20px;
            }
            .system-title {
                font-size: 22px;
            }
            .btn-dashboard, .btn-report {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>

    <!-- Main splash card -->
    <div class="splash-card">
        <div class="logo-icon">
            <i class="bi bi-building"></i>
        </div>
        
        <div class="ministry-title">
            UNIT KEMUDAHAN ASAS (UKA)
        </div>
        
        <div class="system-title">
            UKA Technical Report System
        </div>
        
        <div class="system-subtitle">
            Ministry of Education, Brunei Darussalam<br>
            Water | Electricity | Telephone Services
        </div>
        
        <!-- Brunei Flag Colors -->
        <div class="brunei-flag">
            <div class="flag-bar flag-yellow"></div>
            <div class="flag-bar flag-black"></div>
            <div class="flag-bar flag-white"></div>
            <div class="flag-bar flag-red"></div>
        </div>
        
        <!-- Action Buttons -->
        <div class="btn-container">
            <a href="/dashboard" class="btn-dashboard" id="dashboardBtn">
                <i class="bi bi-speedometer2"></i> Go to Dashboard
            </a>
            <a href="/new-report" class="btn-report" id="reportBtn">
                <i class="bi bi-plus-circle"></i> Create New Report
            </a>
        </div>
        
        <div class="version-info">
            Version 1.0 | Unit Kemudahan Asas (UKA), Ministry of Education
        </div>
    </div>

    <script>
        // Optional: Add click tracking
        document.getElementById('dashboardBtn').addEventListener('click', function(e) {
            console.log('User clicked Go to Dashboard');
        });
        
        document.getElementById('reportBtn').addEventListener('click', function(e) {
            console.log('User clicked Create New Report');
        });
        
        // No automatic redirect - page stays until user clicks
    </script>
</body>
</html>
