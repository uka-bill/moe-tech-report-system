<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKA Technical Report System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #9b59b6;
            --primary-dark: #8e44ad;
            --primary-light: #d4b8e8;
            --secondary-color: #f3e5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background shapes */
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 350px;
            height: 350px;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 250px;
            height: 250px;
            bottom: -100px;
            right: -100px;
            animation-delay: 5s;
        }

        .shape-3 {
            width: 180px;
            height: 180px;
            top: 50%;
            left: 10%;
            animation-delay: 10s;
        }

        .shape-4 {
            width: 300px;
            height: 300px;
            bottom: 20%;
            right: 5%;
            animation-delay: 15s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            33% {
                transform: translateY(-40px) translateX(25px) rotate(120deg);
            }
            66% {
                transform: translateY(40px) translateX(-25px) rotate(240deg);
            }
        }

        /* Main splash card - Modern Gradient */
        .splash-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 45px 40px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.3);
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .ministry-title {
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--primary-dark);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .system-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .system-subtitle {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .brunei-flag {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
        }

        .flag-bar {
            width: 45px;
            height: 5px;
            border-radius: 3px;
        }

        .flag-yellow { background: linear-gradient(135deg, #FFD700 0%, #FFC107 100%); }
        .flag-black { background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%); }
        .flag-white { background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%); border: 1px solid #ddd; }
        .flag-red { background: linear-gradient(135deg, #DC143C 0%, #c82333 100%); }

        .btn-container {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-dashboard {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(155, 89, 182, 0.3);
        }

        .btn-dashboard:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(155, 89, 182, 0.4);
            color: white;
        }

        .btn-report {
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-report:hover {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(155, 89, 182, 0.2);
            border-color: transparent;
        }

        .version-info {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #eef2f7;
            font-size: 11px;
            color: #95a5a6;
        }

        @media (max-width: 576px) {
            .splash-card {
                padding: 30px 20px;
            }
            .system-title {
                font-size: 24px;
            }
            .btn-dashboard, .btn-report {
                padding: 10px 22px;
                font-size: 14px;
            }
            .logo-icon {
                width: 65px;
                height: 65px;
            }
            .logo-icon i {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>

    <!-- Main splash card -->
    <div class="splash-card">
        <div class="logo-icon">
            <i class="bi bi-building"></i>
        </div>
        
        <div class="ministry-title">
            UNIT KEMUDAHAN ASAS (UKA)
        </div>
        
        <div class="system-title">
            UKA Technical Report System
        </div>
        
        <div class="system-subtitle">
            Ministry of Education, Brunei Darussalam<br>
            <strong>Water</strong> | <strong>Electricity</strong> | <strong>Telephone</strong> Services
        </div>
        
        <!-- Brunei Flag Colors -->
        <div class="brunei-flag">
            <div class="flag-bar flag-yellow"></div>
            <div class="flag-bar flag-black"></div>
            <div class="flag-bar flag-white"></div>
            <div class="flag-bar flag-red"></div>
        </div>
        
        <!-- Action Buttons -->
        <div class="btn-container">
            <a href="/dashboard" class="btn-dashboard" id="dashboardBtn">
                <i class="bi bi-speedometer2"></i> Go to Dashboard
            </a>
            <a href="/new-report" class="btn-report" id="reportBtn">
                <i class="bi bi-plus-circle"></i> Create New Report
            </a>
        </div>
        
        <div class="version-info">
            <i class="bi bi-shield-check"></i> Version 2.0 | Unit Kemudahan Asas (UKA), Ministry of Education
        </div>
    </div>

    <script>
        // Optional: Add click tracking
        document.getElementById('dashboardBtn').addEventListener('click', function(e) {
            console.log('User clicked Go to Dashboard');
        });
        
        document.getElementById('reportBtn').addEventListener('click', function(e) {
            console.log('User clicked Create New Report');
        });
        
        // No automatic redirect - page stays until user clicks
    </script>
</body>
</html>
