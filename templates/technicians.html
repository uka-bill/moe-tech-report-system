{% extends "base.html" %}

{% block content %}
<style>
    .specialization-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        margin: 2px;
    }
    .spec-water {
        background-color: #e3f2fd;
        color: #1976d2;
    }
    .spec-electricity {
        background-color: #fff3e0;
        color: #f57c00;
    }
    .spec-telephone {
        background-color: #e8f5e9;
        color: #388e3c;
    }
    .checkbox-group {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 10px;
    }
    .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 8px 15px;
        border-radius: 8px;
        background-color: #f8f5fc;
        transition: all 0.2s;
    }
    .checkbox-group label:hover {
        background-color: var(--secondary-color);
    }
    .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--primary-color);
    }
    .filter-spec-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
    }
    .filter-spec-btn {
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid #ddd;
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 12px;
    }
    .filter-spec-btn.active {
        background: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
    }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-people"></i> Technicians Management</h2>
    <button class="btn btn-primary" onclick="showAddTechModal()">
        <i class="bi bi-plus-circle"></i> Add Technician
    </button>
</div>

<!-- Filter by Specialization -->
<div class="card mb-3">
    <div class="card-body">
        <label class="form-label fw-bold">Filter by Specialization:</label>
        <div class="filter-spec-buttons">
            <button class="filter-spec-btn active" onclick="filterBySpec('all')">All</button>
            <button class="filter-spec-btn" onclick="filterBySpec('water')">💧 Water</button>
            <button class="filter-spec-btn" onclick="filterBySpec('electricity')">⚡ Electricity</button>
            <button class="filter-spec-btn" onclick="filterBySpec('telephone')">📞 Telephone</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="bi bi-list-ul"></i> Technician Directory
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Employee ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Specializations</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="techniciansTable">
                    <tr><td colspan="8" class="text-center">Loading...</td</tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit Technician Modal -->
<div class="modal fade" id="techModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="techModalTitle">Add Technician</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="techForm">
                    <input type="hidden" id="techId">
                    <div class="mb-3">
                        <label class="form-label">Employee ID *</label>
                        <input type="text" class="form-control" id="employeeId" required placeholder="e.g., TECH001">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="techName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role *</label>
                        <select class="form-select" id="techRole" required>
                            <option value="technician">Technician</option>
                            <option value="senior_technician">Senior Technician</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Specializations *</label>
                        <small class="text-muted d-block mb-2">Select all areas this technician is qualified for</small>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" value="water" class="spec-checkbox">
                                <i class="bi bi-droplet" style="color: #1976d2;"></i> Water
                            </label>
                            <label>
                                <input type="checkbox" value="electricity" class="spec-checkbox">
                                <i class="bi bi-lightning-charge" style="color: #f57c00;"></i> Electricity
                            </label>
                            <label>
                                <input type="checkbox" value="telephone" class="spec-checkbox">
                                <i class="bi bi-telephone" style="color: #388e3c;"></i> Telephone
                            </label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="techPhone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="techEmail">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveTechnician()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    let allTechnicians = [];
    let currentFilter = 'all';
    
    async function loadTechnicians() {
        try {
            const response = await fetch('/api/technicians');
            allTechnicians = await response.json();
            applyFilter();
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function filterBySpec(spec) {
        currentFilter = spec;
        // Update active button styles
        document.querySelectorAll('.filter-spec-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.includes(spec === 'water' ? 'Water' : spec === 'electricity' ? 'Electricity' : spec === 'telephone' ? 'Telephone' : 'All')) {
                btn.classList.add('active');
            }
        });
        applyFilter();
    }
    
    function applyFilter() {
        let filtered = [...allTechnicians];
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(tech => {
                const specializations = tech.specializations || [];
                return specializations.includes(currentFilter);
            });
        }
        
        displayTechnicians(filtered);
    }
    
    function displayTechnicians(technicians) {
        const tbody = document.getElementById('techniciansTable');
        if (!technicians || technicians.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center">No technicians found</td></tr>';
            return;
        }
        
        tbody.innerHTML = technicians.map((tech, index) => {
            const specializations = tech.specializations || [];
            const specBadges = specializations.map(spec => {
                const icon = spec === 'water' ? '💧' : spec === 'electricity' ? '⚡' : '📞';
                const label = spec === 'water' ? 'Water' : spec === 'electricity' ? 'Electricity' : 'Telephone';
                return `<span class="specialization-badge spec-${spec}">${icon} ${label}</span>`;
            }).join('');
            
            return `
                <tr>
                    <td><strong>${index + 1}</strong></td>
                    <td><span class="badge bg-primary">${tech.employee_id || 'N/A'}</span></td>
                    <td><strong>${tech.name}</strong></td>
                    <td>${tech.role === 'senior_technician' ? '<span class="badge bg-warning">Senior Technician</span>' : '<span class="badge bg-info">Technician</span>'}</td>
                    <td>${specBadges || '<span class="text-muted">No specializations</span>'}</td>
                    <td>${tech.phone || '-'}</td>
                    <td>${tech.email || '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editTechnician(${tech.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteTechnician(${tech.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }
    
    function showAddTechModal() {
        document.getElementById('techModalTitle').textContent = 'Add Technician';
        document.getElementById('techForm').reset();
        document.getElementById('techId').value = '';
        // Clear checkboxes
        document.querySelectorAll('.spec-checkbox').forEach(cb => cb.checked = false);
        suggestNextEmployeeId();
        const modal = new bootstrap.Modal(document.getElementById('techModal'));
        modal.show();
    }
    
    async function suggestNextEmployeeId() {
        try {
            const response = await fetch('/api/technicians');
            const technicians = await response.json();
            const count = technicians.length;
            const nextNumber = String(count + 1).padStart(3, '0');
            document.getElementById('employeeId').value = `TECH${nextNumber}`;
        } catch (error) {
            document.getElementById('employeeId').value = 'TECH001';
        }
    }
    
    async function editTechnician(id) {
        const response = await fetch('/api/technicians');
        const technicians = await response.json();
        const tech = technicians.find(t => t.id === id);
        
        if (tech) {
            document.getElementById('techModalTitle').textContent = 'Edit Technician';
            document.getElementById('techId').value = tech.id;
            document.getElementById('employeeId').value = tech.employee_id || '';
            document.getElementById('techName').value = tech.name || '';
            document.getElementById('techRole').value = tech.role || 'technician';
            document.getElementById('techPhone').value = tech.phone || '';
            document.getElementById('techEmail').value = tech.email || '';
            
            // Set checkboxes based on specializations
            const specializations = tech.specializations || [];
            document.querySelectorAll('.spec-checkbox').forEach(cb => {
                cb.checked = specializations.includes(cb.value);
            });
            
            const modal = new bootstrap.Modal(document.getElementById('techModal'));
            modal.show();
        }
    }
    
    async function saveTechnician() {
        const id = document.getElementById('techId').value;
        
        // Get selected specializations
        const specializations = [];
        document.querySelectorAll('.spec-checkbox:checked').forEach(cb => {
            specializations.push(cb.value);
        });
        
        const data = {
            name: document.getElementById('techName').value,
            role: document.getElementById('techRole').value,
            employee_id: document.getElementById('employeeId').value,
            specializations: specializations,
            phone: document.getElementById('techPhone').value,
            email: document.getElementById('techEmail').value
        };
        
        if (!data.name) {
            showToast('Technician name is required', 'error');
            return;
        }
        
        if (!data.employee_id) {
            showToast('Employee ID is required', 'error');
            return;
        }
        
        if (specializations.length === 0) {
            showToast('Please select at least one specialization', 'error');
            return;
        }
        
        try {
            let response;
            if (id) {
                response = await fetch(`/api/technicians/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } else {
                response = await fetch('/api/technicians', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            }
            
            const result = await response.json();
            if (result.success) {
                showToast(id ? 'Technician updated' : 'Technician added');
                bootstrap.Modal.getInstance(document.getElementById('techModal')).hide();
                loadTechnicians();
            } else {
                showToast(result.error || 'Failed to save', 'error');
            }
        } catch (error) {
            showToast('Error saving technician', 'error');
        }
    }
    
    async function deleteTechnician(id) {
        if (confirm('Are you sure you want to delete this technician?')) {
            try {
                const response = await fetch(`/api/technicians/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    showToast('Technician deleted');
                    loadTechnicians();
                } else {
                    showToast(result.error || 'Cannot delete technician with assigned reports', 'error');
                }
            } catch (error) {
                showToast('Error deleting technician', 'error');
            }
        }
    }
    
    loadTechnicians();
</script>
{% endblock %}
