{% extends "base.html" %}

{% block content %}
<style>
    .reference-group {
        background-color: #f8f5fc;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        border: 1px solid var(--primary-light);
    }
    .reference-title {
        font-weight: bold;
        color: var(--primary-dark);
        margin-bottom: 10px;
    }
    .datetime-panel {
        background: linear-gradient(135deg, var(--primary-light) 0%, var(--secondary-color) 100%);
        padding: 10px 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
    }
    .datetime-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
    }
    .datetime-label {
        font-weight: bold;
        color: var(--primary-dark);
    }
    .datetime-value {
        font-family: monospace;
        background-color: white;
        padding: 4px 10px;
        border-radius: 6px;
        color: #333;
    }
    .auto-save-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #28a745;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
    }
</style>

<div class="card">
    <div class="card-header">
        <i class="bi bi-plus-circle"></i> Create New Technical Report
    </div>
    <div class="card-body">
        <!-- Date/Time Panel at Top Right -->
        <div class="datetime-panel">
            <div class="datetime-item">
                <i class="bi bi-calendar-plus"></i>
                <span class="datetime-label">Created:</span>
                <span class="datetime-value" id="createdDateTime">-</span>
            </div>
            <div class="datetime-item">
                <i class="bi bi-save2"></i>
                <span class="datetime-label">Last Saved:</span>
                <span class="datetime-value" id="lastSavedDateTime">-</span>
                <span class="auto-save-indicator" id="autoSaveIndicator" style="display: none;"></span>
            </div>
            <div class="datetime-item">
                <i class="bi bi-person"></i>
                <span class="datetime-label">Created By:</span>
                <span class="datetime-value" id="createdBy">-</span>
            </div>
        </div>

        <form id="reportForm">
            <!-- Report Type Selection -->
            <div class="row mb-4">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Report Type *</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="reportType" id="waterType" value="water" autocomplete="off" checked>
                        <label class="btn btn-outline-info" for="waterType">
                            <i class="bi bi-droplet"></i> Water
                        </label>
                        
                        <input type="radio" class="btn-check" name="reportType" id="electricityType" value="electricity" autocomplete="off">
                        <label class="btn btn-outline-warning" for="electricityType">
                            <i class="bi bi-lightning-charge"></i> Electricity
                        </label>
                        
                        <input type="radio" class="btn-check" name="reportType" id="telephoneType" value="telephone" autocomplete="off">
                        <label class="btn btn-outline-success" for="telephoneType">
                            <i class="bi bi-telephone"></i> Telephone
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Entity Selection -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Entity Type *</label>
                    <select class="form-select" id="entityType" required>
                        <option value="">Select Entity Type</option>
                        <option value="school">School</option>
                        <option value="department">Department</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Entity Name *</label>
                    <select class="form-select" id="entityId" required disabled>
                        <option value="">Select Entity Type First</option>
                    </select>
                </div>
            </div>
            
            <!-- Reference Number Section -->
            <div class="reference-group">
                <div class="reference-title">
                    <i class="bi bi-file-text"></i> Reference Information
                </div>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Reference Type</label>
                        <select class="form-select" id="referenceType">
                            <option value="">Select Reference Type</option>
                            <option value="memo">📝 Memo</option>
                            <option value="minute">📋 Minute</option>
                            <option value="letter">✉️ Letter</option>
                            <option value="email">📧 Email</option>
                            <option value="other">📄 Other</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Reference Number</label>
                        <input type="text" class="form-control" id="referenceNumber" placeholder="e.g., MOE/UKA/001/2026, MIN 05/2026">
                        <small class="text-muted">Enter the reference number from the document</small>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Reference Date</label>
                        <input type="date" class="form-control" id="referenceDate">
                        <small class="text-muted">Date of the reference document</small>
                    </div>
                </div>
            </div>
            
            <!-- Account Details (dynamic based on type) -->
            <div id="waterFields" class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Water Account Number</label>
                    <input type="text" class="form-control" id="accountNumber" placeholder="e.g., W-12345">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Water Meter Number</label>
                    <input type="text" class="form-control" id="meterNumber" placeholder="e.g., MTR-12345">
                </div>
            </div>
            
            <div id="electricityFields" class="row mb-3" style="display: none;">
                <div class="col-md-6">
                    <label class="form-label">Electricity Account Number</label>
                    <input type="text" class="form-control" id="electricityAccountNumber" placeholder="e.g., E-12345">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Electricity Meter Number</label>
                    <input type="text" class="form-control" id="electricityMeterNumber" placeholder="e.g., MET-12345">
                </div>
            </div>
            
            <div id="telephoneFields" class="row mb-3" style="display: none;">
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" id="phoneNumber" placeholder="e.g., 2380000">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Number of Lines</label>
                    <input type="number" class="form-control" id="numberOfLines" placeholder="e.g., 10">
                </div>
            </div>
            
            <!-- Problem Details -->
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Problem Type *</label>
                    <select class="form-select" id="problemType" required>
                        <option value="">Select Problem Type</option>
                    </select>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Complaint Details *</label>
                    <textarea class="form-control" id="complaintDetails" rows="4" required placeholder="Please provide detailed description of the problem..."></textarea>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Priority *</label>
                    <select class="form-select" id="priority" required>
                        <option value="low">Low - Can wait</option>
                        <option value="medium" selected>Medium - Needs attention soon</option>
                        <option value="high">High - Urgent / Emergency</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Assign To (Technician) *</label>
                    <select class="form-select" id="technicianId" required>
                        <option value="">Select Technician</option>
                    </select>
                    <small class="text-muted" id="techFilterNote"></small>
                </div>
            </div>
            
            <!-- Image Upload -->
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Upload Images (Optional)</label>
                    <input type="file" class="form-control" id="imageUpload" accept="image/*" multiple>
                    <small class="text-muted">You can upload multiple images (JPG, PNG, GIF, up to 16MB each)</small>
                    <div id="imagePreviewContainer" class="mt-2 d-flex flex-wrap gap-2"></div>
                </div>
            </div>
            
            <!-- Technician Notes -->
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Initial Notes / Observations</label>
                    <textarea class="form-control" id="technicianNotes" rows="3" placeholder="Any initial observations or notes..."></textarea>
                </div>
            </div>
            
            <!-- Submit Buttons -->
            <div class="row">
                <div class="col-md-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Submit Report
                    </button>
                    <button type="reset" class="btn btn-secondary" onclick="resetForm()">
                        <i class="bi bi-eraser"></i> Clear Form
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    let uploadedImages = [];
    let allTechnicians = [];
    let createdDateTime = null;
    let lastSavedDateTime = null;
    let autoSaveTimer = null;
    
    // Format date and time
    function formatDateTime(date) {
        const d = new Date(date);
        return d.toLocaleString('en-GB', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }
    
    // Initialize date/time when page loads
    function initializeDateTime() {
        const now = new Date();
        createdDateTime = now;
        lastSavedDateTime = now;
        
        document.getElementById('createdDateTime').textContent = formatDateTime(createdDateTime);
        document.getElementById('lastSavedDateTime').textContent = formatDateTime(lastSavedDateTime);
        
        // Set created by from current user
        const user = getCurrentUser();
        document.getElementById('createdBy').textContent = user.name || 'Unknown User';
    }
    
    // Update last saved timestamp
    function updateLastSaved() {
        const now = new Date();
        lastSavedDateTime = now;
        document.getElementById('lastSavedDateTime').textContent = formatDateTime(lastSavedDateTime);
        
        // Show auto-save indicator
        const indicator = document.getElementById('autoSaveIndicator');
        indicator.style.display = 'inline-block';
        
        // Hide indicator after 2 seconds
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
            indicator.style.display = 'none';
        }, 2000);
    }
    
    // Auto-save form data to localStorage
    function autoSaveForm() {
        const formData = {
            reportType: document.querySelector('input[name="reportType"]:checked')?.value,
            entityType: document.getElementById('entityType').value,
            entityId: document.getElementById('entityId').value,
            referenceType: document.getElementById('referenceType').value,
            referenceNumber: document.getElementById('referenceNumber').value,
            referenceDate: document.getElementById('referenceDate').value,
            accountNumber: document.getElementById('accountNumber')?.value,
            meterNumber: document.getElementById('meterNumber')?.value,
            electricityAccountNumber: document.getElementById('electricityAccountNumber')?.value,
            electricityMeterNumber: document.getElementById('electricityMeterNumber')?.value,
            phoneNumber: document.getElementById('phoneNumber')?.value,
            numberOfLines: document.getElementById('numberOfLines')?.value,
            problemType: document.getElementById('problemType').value,
            complaintDetails: document.getElementById('complaintDetails').value,
            priority: document.getElementById('priority').value,
            technicianId: document.getElementById('technicianId').value,
            technicianNotes: document.getElementById('technicianNotes').value,
            uploadedImages: uploadedImages,
            lastSaved: new Date().toISOString()
        };
        
        localStorage.setItem('autoSaveReport', JSON.stringify(formData));
        updateLastSaved();
    }
    
    // Load auto-saved data
    function loadAutoSave() {
        const savedData = localStorage.getItem('autoSaveReport');
        if (savedData) {
            const data = JSON.parse(savedData);
            const confirmLoad = confirm('You have an unsaved draft. Do you want to load it?');
            if (confirmLoad) {
                // Restore report type
                if (data.reportType) {
                    document.querySelector(`input[name="reportType"][value="${data.reportType}"]`).checked = true;
                    // Trigger change event
                    document.querySelector(`input[name="reportType"][value="${data.reportType}"]`).dispatchEvent(new Event('change'));
                }
                
                // Restore entity
                if (data.entityType) {
                    document.getElementById('entityType').value = data.entityType;
                    document.getElementById('entityType').dispatchEvent(new Event('change'));
                    setTimeout(() => {
                        if (data.entityId) {
                            document.getElementById('entityId').value = data.entityId;
                        }
                    }, 500);
                }
                
                // Restore reference fields
                document.getElementById('referenceType').value = data.referenceType || '';
                document.getElementById('referenceNumber').value = data.referenceNumber || '';
                document.getElementById('referenceDate').value = data.referenceDate || '';
                
                // Restore account fields
                if (document.getElementById('accountNumber')) document.getElementById('accountNumber').value = data.accountNumber || '';
                if (document.getElementById('meterNumber')) document.getElementById('meterNumber').value = data.meterNumber || '';
                if (document.getElementById('electricityAccountNumber')) document.getElementById('electricityAccountNumber').value = data.electricityAccountNumber || '';
                if (document.getElementById('electricityMeterNumber')) document.getElementById('electricityMeterNumber').value = data.electricityMeterNumber || '';
                if (document.getElementById('phoneNumber')) document.getElementById('phoneNumber').value = data.phoneNumber || '';
                if (document.getElementById('numberOfLines')) document.getElementById('numberOfLines').value = data.numberOfLines || '';
                
                // Restore problem details
                document.getElementById('problemType').value = data.problemType || '';
                document.getElementById('complaintDetails').value = data.complaintDetails || '';
                document.getElementById('priority').value = data.priority || 'medium';
                document.getElementById('technicianNotes').value = data.technicianNotes || '';
                
                // Restore technician
                if (data.technicianId) {
                    setTimeout(() => {
                        document.getElementById('technicianId').value = data.technicianId;
                    }, 1000);
                }
                
                // Restore images
                if (data.uploadedImages && data.uploadedImages.length > 0) {
                    uploadedImages = data.uploadedImages;
                    const previewContainer = document.getElementById('imagePreviewContainer');
                    uploadedImages.forEach(imageUrl => {
                        const preview = document.createElement('div');
                        preview.className = 'position-relative';
                        preview.innerHTML = `
                            <img src="${imageUrl}" class="image-preview" alt="Preview">
                            <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0" onclick="removeImage('${imageUrl}')" style="border-radius: 50%;">&times;</button>
                        `;
                        previewContainer.appendChild(preview);
                    });
                }
                
                updateLastSaved();
                showToast('Draft loaded successfully');
            } else {
                clearAutoSave();
            }
        }
    }
    
    // Clear auto-save
    function clearAutoSave() {
        localStorage.removeItem('autoSaveReport');
    }
    
    // Reset form
    function resetForm() {
        if (confirm('Are you sure you want to clear all form data?')) {
            document.getElementById('reportForm').reset();
            uploadedImages = [];
            document.getElementById('imagePreviewContainer').innerHTML = '';
            clearAutoSave();
            initializeDateTime();
            showToast('Form cleared');
        }
    }
    
    // Load technicians on page load
    async function loadTechnicians() {
        try {
            const response = await fetch('/api/technicians');
            allTechnicians = await response.json();
            console.log('Loaded technicians:', allTechnicians);
            filterTechniciansByType('water');
        } catch (error) {
            console.error('Error loading technicians:', error);
            showToast('Error loading technicians', 'error');
        }
    }
    
    // Filter technicians based on report type
    function filterTechniciansByType(reportType) {
        const select = document.getElementById('technicianId');
        
        const filteredTechnicians = allTechnicians.filter(tech => {
            const specializations = tech.specializations || [];
            return specializations.includes(reportType);
        });
        
        if (filteredTechnicians.length === 0) {
            select.innerHTML = '<option value="">No technicians available for this type</option>';
            document.getElementById('techFilterNote').innerHTML = `<span class="text-danger">⚠️ No technicians found with ${reportType} specialization. Please add a technician first.</span>`;
            select.disabled = true;
        } else {
            select.innerHTML = '<option value="">Select Technician</option>' + 
                filteredTechnicians.map(tech => {
                    const roleBadge = tech.role === 'senior_technician' ? '⭐ Senior' : '👤 Tech';
                    const specText = (tech.specializations || []).map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(', ');
                    return `<option value="${tech.id}">${roleBadge} ${tech.name} - [${specText}]</option>`;
                }).join('');
            select.disabled = false;
            document.getElementById('techFilterNote').innerHTML = `<span class="text-success">✅ ${filteredTechnicians.length} technician(s) available for ${reportType} issues</span>`;
        }
        
        const currentUser = getCurrentUser();
        if (currentUser.id && !isNaN(parseInt(currentUser.id))) {
            const option = Array.from(select.options).find(opt => opt.value === currentUser.id);
            if (option) option.selected = true;
        }
    }
    
    // Load schools and departments
    async function loadSchools() {
        const response = await fetch('/api/schools');
        return await response.json();
    }
    
    async function loadDepartments() {
        const response = await fetch('/api/departments');
        return await response.json();
    }
    
    // Handle entity type change
    document.getElementById('entityType').addEventListener('change', async function() {
        const entitySelect = document.getElementById('entityId');
        if (this.value === 'school') {
            const schools = await loadSchools();
            if (schools.length === 0) {
                entitySelect.innerHTML = '<option value="">No schools found. Please add schools first.</option>';
            } else {
                entitySelect.innerHTML = '<option value="">Select School</option>' + 
                    schools.map(s => `<option value="${s.id}">${s.name} (${s.school_number || 'No code'})</option>`).join('');
            }
            entitySelect.disabled = false;
        } else if (this.value === 'department') {
            const departments = await loadDepartments();
            if (departments.length === 0) {
                entitySelect.innerHTML = '<option value="">No departments found. Please add departments first.</option>';
            } else {
                entitySelect.innerHTML = '<option value="">Select Department</option>' + 
                    departments.map(d => `<option value="${d.id}">${d.unit_name || d.name} - ${d.name}</option>`).join('');
            }
            entitySelect.disabled = false;
        } else {
            entitySelect.innerHTML = '<option value="">Select Entity Type First</option>';
            entitySelect.disabled = true;
        }
        autoSaveForm();
    });
    
    // Handle report type change
    document.querySelectorAll('input[name="reportType"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('waterFields').style.display = 'none';
            document.getElementById('electricityFields').style.display = 'none';
            document.getElementById('telephoneFields').style.display = 'none';
            
            if (this.value === 'water') {
                document.getElementById('waterFields').style.display = 'flex';
                updateProblemTypeOptions('water');
            } else if (this.value === 'electricity') {
                document.getElementById('electricityFields').style.display = 'flex';
                updateProblemTypeOptions('electricity');
            } else if (this.value === 'telephone') {
                document.getElementById('telephoneFields').style.display = 'flex';
                updateProblemTypeOptions('telephone');
            }
            
            filterTechniciansByType(this.value);
            autoSaveForm();
        });
    });
    
    function updateProblemTypeOptions(type) {
        const problemSelect = document.getElementById('problemType');
        let options = [];
        
        if (type === 'water') {
            options = ['Leakage', 'Low Pressure', 'No Water', 'Pipe Burst', 'Water Quality Issue', 'Pump Failure', 'Tank Issue', 'Other'];
        } else if (type === 'electricity') {
            options = ['Power Outage', 'Faulty Wiring', 'Tripped Breaker', 'Generator Issue', 'Electrical Hazard', 'Flickering Lights', 'Dead Socket', 'Other'];
        } else if (type === 'telephone') {
            options = ['Dead Line', 'Static Noise', 'Call Drops', 'PBX Issue', 'Internet Connectivity Issue', 'No Dial Tone', 'Crossed Lines', 'Other'];
        }
        
        problemSelect.innerHTML = '<option value="">Select Problem Type</option>' + 
            options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
    }
    
    // Add auto-save triggers to all form inputs
    function addAutoSaveTriggers() {
        const inputs = ['#entityType', '#entityId', '#referenceType', '#referenceNumber', '#referenceDate',
            '#accountNumber', '#meterNumber', '#electricityAccountNumber', '#electricityMeterNumber',
            '#phoneNumber', '#numberOfLines', '#problemType', '#complaintDetails', '#priority', 
            '#technicianId', '#technicianNotes'];
        
        inputs.forEach(selector => {
            const element = document.querySelector(selector);
            if (element) {
                element.addEventListener('change', autoSaveForm);
                element.addEventListener('input', autoSaveForm);
            }
        });
        
        // Add auto-save for radio buttons
        document.querySelectorAll('input[name="reportType"]').forEach(radio => {
            radio.addEventListener('change', autoSaveForm);
        });
    }
    
    // Image upload handling
    document.getElementById('imageUpload').addEventListener('change', async function(e) {
        const files = Array.from(e.target.files);
        const previewContainer = document.getElementById('imagePreviewContainer');
        
        for (const file of files) {
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch('/api/upload-image', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    uploadedImages.push(data.image_url);
                    autoSaveForm();
                    
                    const preview = document.createElement('div');
                    preview.className = 'position-relative';
                    preview.innerHTML = `
                        <img src="${data.image_url}" class="image-preview" alt="Preview">
                        <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0" onclick="removeImage('${data.image_url}')" style="border-radius: 50%;">&times;</button>
                    `;
                    previewContainer.appendChild(preview);
                    
                    showToast('Image uploaded successfully');
                } else {
                    showToast('Failed to upload image: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('Error uploading image', 'error');
            }
        }
        
        document.getElementById('imageUpload').value = '';
    });
    
    function removeImage(imageUrl) {
        uploadedImages = uploadedImages.filter(img => img !== imageUrl);
        const previewContainer = document.getElementById('imagePreviewContainer');
        const previews = previewContainer.children;
        for (let i = 0; i < previews.length; i++) {
            if (previews[i].querySelector('img')?.src === imageUrl) {
                previews[i].remove();
                break;
            }
        }
        autoSaveForm();
    }
    
    // Form submission
    document.getElementById('reportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const reportType = document.querySelector('input[name="reportType"]:checked').value;
        const entityType = document.getElementById('entityType').value;
        const entityId = document.getElementById('entityId').value;
        const technicianId = document.getElementById('technicianId').value;
        
        if (!entityType || !entityId) {
            showToast('Please select entity type and name', 'error');
            return;
        }
        
        if (!technicianId) {
            showToast('Please select a technician to assign', 'error');
            return;
        }
        
        const reportData = {
            report_type: reportType,
            entity_type: entityType,
            entity_id: parseInt(entityId),
            account_number: reportType === 'water' ? document.getElementById('accountNumber').value : 
                           (reportType === 'electricity' ? document.getElementById('electricityAccountNumber').value : ''),
            meter_number: reportType === 'water' ? document.getElementById('meterNumber').value : 
                         (reportType === 'electricity' ? document.getElementById('electricityMeterNumber').value : ''),
            phone_number: reportType === 'telephone' ? document.getElementById('phoneNumber').value : '',
            number_of_lines: reportType === 'telephone' ? parseInt(document.getElementById('numberOfLines').value) || null : null,
            problem_type: document.getElementById('problemType').value,
            complaint_details: document.getElementById('complaintDetails').value,
            priority: document.getElementById('priority').value,
            technician_id: parseInt(technicianId),
            technician_notes: document.getElementById('technicianNotes').value,
            images: uploadedImages,
            status: 'pending',
            reference_type: document.getElementById('referenceType').value,
            reference_number: document.getElementById('referenceNumber').value,
            reference_date: document.getElementById('referenceDate').value,
            created_at: createdDateTime ? createdDateTime.toISOString() : new Date().toISOString(),
            updated_at: new Date().toISOString()
        };
        
        if (!reportData.problem_type || !reportData.complaint_details) {
            showToast('Please fill in problem type and complaint details', 'error');
            return;
        }
        
        try {
            const response = await fetch('/api/technical-reports', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reportData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                clearAutoSave();
                showToast('Report created successfully!');
                setTimeout(() => {
                    window.location.href = '/my-reports';
                }, 1500);
            } else {
                showToast(data.error || 'Failed to create report', 'error');
            }
        } catch (error) {
            console.error('Error creating report:', error);
            showToast('Error creating report', 'error');
        }
    });
    
    // Set default reference date to today
    document.getElementById('referenceDate').value = new Date().toISOString().split('T')[0];
    
    // Initialize form
    async function initializeForm() {
        initializeDateTime();
        await loadTechnicians();
        updateProblemTypeOptions('water');
        addAutoSaveTriggers();
        
        // Check for auto-saved draft
        loadAutoSave();
        
        if (allTechnicians.length === 0) {
            showToast('No technicians found. Please add technicians first.', 'warning');
        }
    }
    
    initializeForm();
</script>
{% endblock %}
