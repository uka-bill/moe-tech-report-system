{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-plus-circle"></i> Create New Technical Report
    </div>
    <div class="card-body">
        <form id="reportForm">
            <!-- Report Type Selection -->
            <div class="row mb-4">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Report Type *</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="reportType" id="waterType" value="water" autocomplete="off" checked>
                        <label class="btn btn-outline-info" for="waterType">
                            <i class="bi bi-droplet"></i> Water
                        </label>
                        
                        <input type="radio" class="btn-check" name="reportType" id="electricityType" value="electricity" autocomplete="off">
                        <label class="btn btn-outline-warning" for="electricityType">
                            <i class="bi bi-lightning-charge"></i> Electricity
                        </label>
                        
                        <input type="radio" class="btn-check" name="reportType" id="telephoneType" value="telephone" autocomplete="off">
                        <label class="btn btn-outline-success" for="telephoneType">
                            <i class="bi bi-telephone"></i> Telephone
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Entity Selection -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Entity Type *</label>
                    <select class="form-select" id="entityType" required>
                        <option value="">Select Entity Type</option>
                        <option value="school">School</option>
                        <option value="department">Department</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Entity Name *</label>
                    <select class="form-select" id="entityId" required disabled>
                        <option value="">Select Entity Type First</option>
                    </select>
                </div>
            </div>
            
            <!-- Account Details (dynamic based on type) -->
            <div id="waterFields" class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Water Account Number</label>
                    <input type="text" class="form-control" id="accountNumber" placeholder="e.g., W-12345">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Water Meter Number</label>
                    <input type="text" class="form-control" id="meterNumber" placeholder="e.g., MTR-12345">
                </div>
            </div>
            
            <div id="electricityFields" class="row mb-3" style="display: none;">
                <div class="col-md-6">
                    <label class="form-label">Electricity Account Number</label>
                    <input type="text" class="form-control" id="electricityAccountNumber" placeholder="e.g., E-12345">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Electricity Meter Number</label>
                    <input type="text" class="form-control" id="electricityMeterNumber" placeholder="e.g., MET-12345">
                </div>
            </div>
            
            <div id="telephoneFields" class="row mb-3" style="display: none;">
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" id="phoneNumber" placeholder="e.g., 2380000">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Number of Lines</label>
                    <input type="number" class="form-control" id="numberOfLines" placeholder="e.g., 10">
                </div>
            </div>
            
            <!-- Problem Details -->
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Problem Type *</label>
                    <select class="form-select" id="problemType" required>
                        <option value="">Select Problem Type</option>
                        <option value="Leakage">Leakage</option>
                        <option value="Low Pressure">Low Pressure</option>
                        <option value="No Water">No Water</option>
                        <option value="Pipe Burst">Pipe Burst</option>
                        <option value="Water Quality">Water Quality Issue</option>
                        <option value="Power Outage">Power Outage</option>
                        <option value="Faulty Wiring">Faulty Wiring</option>
                        <option value="Tripped Breaker">Tripped Breaker</option>
                        <option value="Generator Issue">Generator Issue</option>
                        <option value="Electrical Hazard">Electrical Hazard</option>
                        <option value="Dead Line">Dead Telephone Line</option>
                        <option value="Static Noise">Static Noise</option>
                        <option value="Call Drops">Call Drops</option>
                        <option value="PBX Issue">PBX Issue</option>
                        <option value="Internet Issue">Internet Connectivity Issue</option>
                    </select>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Complaint Details *</label>
                    <textarea class="form-control" id="complaintDetails" rows="4" required placeholder="Please provide detailed description of the problem..."></textarea>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Priority *</label>
                    <select class="form-select" id="priority" required>
                        <option value="low">Low - Can wait</option>
                        <option value="medium" selected>Medium - Needs attention soon</option>
                        <option value="high">High - Urgent / Emergency</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Technician Name *</label>
                    <select class="form-select" id="technicianId" required>
                        <option value="">Select Technician</option>
                    </select>
                </div>
            </div>
            
            <!-- Image Upload -->
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Upload Images (Optional)</label>
                    <input type="file" class="form-control" id="imageUpload" accept="image/*" multiple>
                    <small class="text-muted">You can upload multiple images (JPG, PNG, GIF, up to 16MB each)</small>
                    <div id="imagePreviewContainer" class="mt-2 d-flex flex-wrap gap-2"></div>
                </div>
            </div>
            
            <!-- Technician Notes -->
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Initial Notes / Observations</label>
                    <textarea class="form-control" id="technicianNotes" rows="3" placeholder="Any initial observations or notes..."></textarea>
                </div>
            </div>
            
            <!-- Submit Buttons -->
            <div class="row">
                <div class="col-md-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Submit Report
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        <i class="bi bi-eraser"></i> Clear Form
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    let uploadedImages = [];
    
    // Load schools and departments
    async function loadSchools() {
        const response = await fetch('/api/schools');
        return await response.json();
    }
    
    async function loadDepartments() {
        const response = await fetch('/api/departments');
        return await response.json();
    }
    
    async function loadTechnicians() {
        const response = await fetch('/api/technicians');
        const technicians = await response.json();
        const select = document.getElementById('technicianId');
        select.innerHTML = '<option value="">Select Technician</option>' + 
            technicians.map(t => `<option value="${t.id}">${t.name} (${t.role === 'senior_technician' ? 'Senior' : 'Technician'})${t.specialization ? ' - ' + t.specialization : ''}</option>`).join('');
        
        // Auto-select current user if possible
        const currentUser = getCurrentUser();
        if (currentUser.id) {
            const option = Array.from(select.options).find(opt => opt.value === currentUser.id);
            if (option) option.selected = true;
        }
    }
    
    // Handle entity type change
    document.getElementById('entityType').addEventListener('change', async function() {
        const entitySelect = document.getElementById('entityId');
        if (this.value === 'school') {
            const schools = await loadSchools();
            entitySelect.innerHTML = '<option value="">Select School</option>' + 
                schools.map(s => `<option value="${s.id}">${s.name} (Cluster: ${s.cluster_number || '-'})</option>`).join('');
            entitySelect.disabled = false;
        } else if (this.value === 'department') {
            const departments = await loadDepartments();
            entitySelect.innerHTML = '<option value="">Select Department</option>' + 
                departments.map(d => `<option value="${d.id}">${d.name}${d.division ? ' - ' + d.division : ''}</option>`).join('');
            entitySelect.disabled = false;
        } else {
            entitySelect.innerHTML = '<option value="">Select Entity Type First</option>';
            entitySelect.disabled = true;
        }
    });
    
    // Handle report type change
    document.querySelectorAll('input[name="reportType"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('waterFields').style.display = 'none';
            document.getElementById('electricityFields').style.display = 'none';
            document.getElementById('telephoneFields').style.display = 'none';
            
            if (this.value === 'water') {
                document.getElementById('waterFields').style.display = 'flex';
                updateProblemTypeOptions('water');
            } else if (this.value === 'electricity') {
                document.getElementById('electricityFields').style.display = 'flex';
                updateProblemTypeOptions('electricity');
            } else if (this.value === 'telephone') {
                document.getElementById('telephoneFields').style.display = 'flex';
                updateProblemTypeOptions('telephone');
            }
        });
    });
    
    function updateProblemTypeOptions(type) {
        const problemSelect = document.getElementById('problemType');
        let options = [];
        
        if (type === 'water') {
            options = ['Leakage', 'Low Pressure', 'No Water', 'Pipe Burst', 'Water Quality Issue', 'Pump Failure', 'Tank Issue', 'Other'];
        } else if (type === 'electricity') {
            options = ['Power Outage', 'Faulty Wiring', 'Tripped Breaker', 'Generator Issue', 'Electrical Hazard', 'Flickering Lights', 'Dead Socket', 'Other'];
        } else if (type === 'telephone') {
            options = ['Dead Line', 'Static Noise', 'Call Drops', 'PBX Issue', 'Internet Connectivity Issue', 'No Dial Tone', 'Crossed Lines', 'Other'];
        }
        
        problemSelect.innerHTML = '<option value="">Select Problem Type</option>' + 
            options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
    }
    
    // Image upload handling
    document.getElementById('imageUpload').addEventListener('change', async function(e) {
        const files = Array.from(e.target.files);
        const previewContainer = document.getElementById('imagePreviewContainer');
        
        for (const file of files) {
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch('/api/upload-image', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    uploadedImages.push(data.image_url);
                    
                    const preview = document.createElement('div');
                    preview.className = 'position-relative';
                    preview.innerHTML = `
                        <img src="${data.image_url}" class="image-preview" alt="Preview">
                        <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0" onclick="removeImage('${data.image_url}')" style="border-radius: 50%;">&times;</button>
                    `;
                    previewContainer.appendChild(preview);
                    
                    showToast('Image uploaded successfully');
                } else {
                    showToast('Failed to upload image: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('Error uploading image', 'error');
            }
        }
        
        document.getElementById('imageUpload').value = '';
    });
    
    function removeImage(imageUrl) {
        uploadedImages = uploadedImages.filter(img => img !== imageUrl);
        const previewContainer = document.getElementById('imagePreviewContainer');
        const previews = previewContainer.children;
        for (let i = 0; i < previews.length; i++) {
            if (previews[i].querySelector('img')?.src === imageUrl) {
                previews[i].remove();
                break;
            }
        }
    }
    
    // Form submission
    document.getElementById('reportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const reportType = document.querySelector('input[name="reportType"]:checked').value;
        const entityType = document.getElementById('entityType').value;
        const entityId = document.getElementById('entityId').value;
        
        if (!entityType || !entityId) {
            showToast('Please select entity type and name', 'error');
            return;
        }
        
        const reportData = {
            report_type: reportType,
            entity_type: entityType,
            entity_id: parseInt(entityId),
            account_number: reportType === 'water' ? document.getElementById('accountNumber').value : 
                           (reportType === 'electricity' ? document.getElementById('electricityAccountNumber').value : ''),
            meter_number: reportType === 'water' ? document.getElementById('meterNumber').value : 
                         (reportType === 'electricity' ? document.getElementById('electricityMeterNumber').value : ''),
            phone_number: reportType === 'telephone' ? document.getElementById('phoneNumber').value : '',
            number_of_lines: reportType === 'telephone' ? parseInt(document.getElementById('numberOfLines').value) || null : null,
            problem_type: document.getElementById('problemType').value,
            complaint_details: document.getElementById('complaintDetails').value,
            priority: document.getElementById('priority').value,
            technician_id: parseInt(document.getElementById('technicianId').value),
            technician_notes: document.getElementById('technicianNotes').value,
            images: uploadedImages,
            status: 'pending'
        };
        
        if (!reportData.problem_type || !reportData.complaint_details) {
            showToast('Please fill in problem type and complaint details', 'error');
            return;
        }
        
        if (!reportData.technician_id) {
            showToast('Please select a technician', 'error');
            return;
        }
        
        try {
            const response = await fetch('/api/technical-reports', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reportData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('Report created successfully!');
                setTimeout(() => {
                    window.location.href = '/my-reports';
                }, 1500);
            } else {
                showToast(data.error || 'Failed to create report', 'error');
            }
        } catch (error) {
            showToast('Error creating report', 'error');
        }
    });
    
    // Initialize
    loadTechnicians();
    updateProblemTypeOptions('water');
</script>
{% endblock %}
